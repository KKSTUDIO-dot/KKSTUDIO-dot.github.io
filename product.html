<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>MotoBeast — деталі товару</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mz-red: #ff0000;
            --mz-black: #08090a;
            --mz-gray: #f8f9fa;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
            --shadow-lg: 0 16px 32px rgba(0,0,0,0.15);
            --border-radius: 24px;
            --input-radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--mz-gray);
            color: #222;
            line-height: 1.5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Шапка */
        .header-top {
            background: #fff;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            box-shadow: var(--shadow-sm);
        }
        .header-flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            flex-wrap: wrap;
        }
        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }
        .logo-icon {
            background: var(--mz-black);
            width: 65px;
            height: 55px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: skewX(-15deg);
            transition: 0.2s;
        }
        .logo-icon i {
            color: var(--mz-red);
            font-size: 34px;
            transform: skewX(15deg);
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            line-height: 0.8;
        }
        .logo-text .m {
            color: var(--mz-black);
            font-size: 18px;
            letter-spacing: 3px;
        }
        .logo-text .b {
            color: var(--mz-red);
            font-size: 32px;
            font-weight: 900;
        }
        .top-nav {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .top-nav a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .top-nav a:hover {
            color: var(--mz-red);
        }
        .user-block {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .auth-btn {
            background: var(--mz-black);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .auth-btn:hover {
            background: var(--mz-red);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info span {
            font-weight: 600;
        }
        .profile-btn {
            background: var(--mz-black);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .profile-btn:hover {
            background: var(--mz-red);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .logout-btn {
            color: var(--mz-red);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,0,0,0.1);
        }
        .contacts-premium {
            text-align: right;
            font-family: Arial, sans-serif;
        }
        .c-phone {
            font-size: 21px;
            font-weight: 900;
            color: #000;
            text-decoration: none;
            display: block;
        }
        .small-text {
            font-size: 11px;
            color: #666;
            display: block;
        }
        .moto-label {
            font-size: 12px;
            color: var(--mz-red);
            font-weight: bold;
        }
        .cart-box {
            width: 50px;
            height: 50px;
            background: var(--mz-black);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .cart-box:hover {
            background: var(--mz-red);
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--mz-red);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            border: 2px solid #fff;
        }

        /* Панель пошуку */
        .nav-bar {
            background: var(--mz-black);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }
        .nav-flex {
            display: flex;
            height: 60px;
            align-items: center;
        }
        .search-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0 20px;
            margin: 10px 0;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .search-container:focus-within {
            background: rgba(255,255,255,0.15);
            border-color: var(--mz-red);
        }
        .search-container input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            height: 40px;
            outline: none;
            font-size: 15px;
            padding-right: 15px;
        }
        .search-container input::placeholder {
            color: #aaa;
        }
        .search-container i {
            color: #888;
            font-size: 18px;
        }

        /* Екран технічних робіт */
        #maintenance-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--mz-black);
            color: white;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Orbitron';
        }
        #maintenance-screen i {
            font-size: 60px;
            color: var(--mz-red);
            margin-bottom: 20px;
        }

        /* Хлібні крихти */
        .breadcrumb {
            margin: 30px 0 20px;
            font-size: 14px;
            color: #888;
        }
        .breadcrumb a {
            color: #666;
            text-decoration: none;
            transition: 0.2s;
        }
        .breadcrumb a:hover {
            color: var(--mz-red);
        }
        .breadcrumb span {
            color: #222;
            font-weight: 600;
        }

        /* Детальна сторінка товару */
        .product-wrapper {
            background: #fff;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            padding: 40px;
            margin-bottom: 50px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }
        /* Галерея */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .main-image {
            background: linear-gradient(145deg, #f0f0f0, #fafafa);
            border-radius: var(--border-radius);
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
            min-height: 300px;
        }
        .main-image img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
        }
        .main-image i {
            font-size: 200px;
            color: #333;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.1));
        }
        .thumbnails {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #666;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .thumbnail:hover {
            border-color: var(--mz-red);
            transform: translateY(-2px);
        }
        .thumbnail.active {
            border-color: var(--mz-red);
            background: #fff;
        }
        /* Інформація про товар */
        .product-info {
            display: flex;
            flex-direction: column;
        }
        .product-title {
            font-size: 40px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--mz-black);
        }
        .product-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .meta-item {
            background: #f0f0f0;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .meta-item i {
            color: var(--mz-red);
            font-size: 16px;
        }
        .price-block {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 20px;
        }
        .old-price {
            font-size: 24px;
            color: #888;
            text-decoration: line-through;
        }
        .product-price {
            font-size: 56px;
            font-weight: 900;
            color: var(--mz-red);
            letter-spacing: -1px;
        }
        .product-stock {
            margin-bottom: 30px;
        }
        .stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
        }
        .in-stock {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .out-stock {
            background: #ffebee;
            color: #c62828;
        }
        .product-actions {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .btn-buy {
            background: var(--mz-black);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: var(--shadow-sm);
            flex: 1 0 auto;
            max-width: 300px;
        }
        .btn-buy:hover {
            background: var(--mz-red);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-wish {
            background: #f0f0f0;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            color: #666;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-wish:hover {
            background: #ffe6e6;
            color: var(--mz-red);
        }

        /* Вкладки */
        .tabs {
            margin-top: 40px;
            border-top: 2px solid #eee;
            padding-top: 30px;
        }
        .tab-headers {
            display: flex;
            gap: 30px;
            border-bottom: 2px solid #eee;
            margin-bottom: 25px;
        }
        .tab-header {
            font-size: 20px;
            font-weight: 700;
            color: #888;
            padding-bottom: 12px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }
        .tab-header.active {
            color: var(--mz-red);
        }
        .tab-header.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--mz-red);
            border-radius: 3px 3px 0 0;
        }
        .tab-content {
            display: none;
            animation: fade 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .desc-content {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 24px;
            font-size: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 24px;
        }
        .spec-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 8px;
        }
        .spec-name {
            font-weight: 600;
            color: #555;
        }
        .spec-value {
            font-weight: 400;
            color: #222;
        }

        /* Схожі товари */
        .related {
            margin-top: 60px;
        }
        .related h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }
        .related-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .related-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--mz-red);
        }
        .related-img {
            height: 140px;
            background: #f5f5f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #aaa;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .related-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .related-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .related-price {
            font-weight: 900;
            color: var(--mz-red);
            font-size: 20px;
        }

        /* ===== ВІДГУКИ (КРАСИВО) ===== */
        .reviews-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid #eee;
        }
        .average-rating {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            font-size: 18px;
            background: #fff;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
        }
        .rating-stars {
            color: #ffc107;
            font-size: 28px;
            letter-spacing: 4px;
        }
        .rating-value {
            font-weight: 900;
            color: var(--mz-red);
            font-size: 32px;
        }
        .reviews-count {
            color: #888;
        }
        .reviews-list {
            margin-bottom: 40px;
        }
        .review-item {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            transition: 0.2s;
            border: 1px solid #f0f0f0;
        }
        .review-item:hover {
            box-shadow: var(--shadow-md);
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .review-name {
            font-weight: 700;
            font-size: 18px;
        }
        .review-date {
            color: #888;
            font-size: 14px;
        }
        .review-rating {
            color: #ffc107;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .review-text {
            line-height: 1.6;
            color: #444;
        }

        /* КРАСИВА ФОРМА ВІДГУКУ */
        .add-review {
            background: #fff;
            border-radius: var(--border-radius);
            padding: 35px;
            box-shadow: var(--shadow-md);
            border: 1px solid #f0f0f0;
        }
        .add-review h3 {
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 800;
        }
        .rating-select {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .rating-select .star {
            font-size: 40px;
            cursor: pointer;
            color: #ccc;
            transition: all 0.2s ease;
        }
        .rating-select .star.selected,
        .rating-select .star:hover {
            color: #ffc107;
            transform: scale(1.1);
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: var(--input-radius);
            font-family: inherit;
            font-size: 16px;
            transition: 0.3s;
            background: #fafafa;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--mz-red);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255,0,0,0.1);
        }
        .btn-primary {
            background: var(--mz-black);
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: var(--shadow-sm);
            display: inline-block;
            width: auto;
            min-width: 200px;
        }
        .btn-primary:hover {
            background: var(--mz-red);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Адаптивність */
        @media (max-width: 900px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .main-image i { font-size: 150px; }
            .product-title { font-size: 32px; }
            .product-price { font-size: 44px; }
            .old-price { font-size: 20px; }
        }
        @media (max-width: 768px) {
            .header-flex { flex-direction: column; align-items: stretch; gap: 15px; }
            .logo-group { justify-content: center; }
            .top-nav { justify-content: center; }
            .user-block { justify-content: center; }
            .contacts-premium { text-align: center; }
            .cart-box { margin: 0 auto; }
            .nav-flex { height: auto; padding: 10px 0; }
            .product-wrapper { padding: 25px; }
            .thumbnails { flex-wrap: wrap; }
            .btn-buy { max-width: 100%; }
            .tab-headers { gap: 15px; }
            .tab-header { font-size: 18px; }
            .average-rating { flex-wrap: wrap; }
            .rating-select .star { font-size: 30px; }
            .add-review { padding: 25px; }
        }
        @media (max-width: 480px) {
            .container { padding: 0 12px; }
            .product-wrapper { padding: 20px; }
            .main-image i { font-size: 120px; }
            .product-title { font-size: 26px; }
            .product-price { font-size: 36px; }
            .btn-buy { font-size: 18px; padding: 14px; }
        }
    </style>
</head>
<body>
    <div id="maintenance-screen">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <h1>MOTO<span>BEAST</span></h1>
        <p>Технічні роботи</p>
    </div>

    <header class="header-top">
        <div class="container header-flex">
            <a href="index.html" class="logo-group">
                <div class="logo-icon"><i class="fa-solid fa-dragon"></i></div>
                <div class="logo-text"><span class="m">MOTO</span><span class="b">BEAST</span></div>
            </a>
            <nav class="top-nav">
                <a href="#">Запчастини</a>
                <a href="#">Екіпіровка</a>
                <a href="#">Акції</a>
                <a href="#">Контакти</a>
            </nav>
            <div class="user-block">
                <div id="auth-buttons">
                    <button class="auth-btn" onclick="window.location.href='index.html'">На головну</button>
                </div>
                <div id="user-info" style="display: none;" class="user-info">
                    <span id="user-name"></span>
                    <a href="profile.html" class="profile-btn"><i class="fa-solid fa-user"></i> Профіль</a>
                    <a onclick="logout()" class="logout-btn">Вийти</a>
                </div>
            </div>
            <div class="contacts-premium">
                <span class="small-text" id="promo-text">Завантаження...</span>
                <a href="tel:+380998183988" class="c-phone" id="site-phone">380998183988</a>
                <span class="small-text">Дзвоніть Пн-Пт 9:00–18:00</span>
                <span class="moto-label">мотозилла мотозапчасти</span>
            </div>
            <div class="actions">
                <div class="cart-box" onclick="window.location.href='cart.html'">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="badge" id="cartBadge">0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="nav-bar">
        <div class="container nav-flex">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Введіть назву запчастини або модель мотоцикла...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
    </div>

    <main class="container">
        <div class="breadcrumb" id="breadcrumb">
            <a href="index.html">Головна</a> / <a href="#">Каталог</a> / <span id="breadcrumb-product">Товар</span>
        </div>

        <div id="product-main"></div> <!-- Сюди завантажиться товар + відгуки -->
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Стан авторизації (для перевірки адміна)
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

        // Функції для корзини
        function getCart() {
            return JSON.parse(localStorage.getItem('motocart')) || [];
        }

        function saveCart(cart) {
            localStorage.setItem('motocart', JSON.stringify(cart));
            updateCartBadge();
        }

        function updateCartBadge() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = totalItems;
        }

        window.addToCart = (product) => {
            const cart = getCart();
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart(cart);
            alert('Товар додано до кошика');
        };

        updateCartBadge();

        // Налаштування (техроботи, телефон, промо)
        onValue(ref(db, 'settings'), (snap) => {
            const s = snap.val();
            if (s) {
                const maintenance = s.maintenance || false;
                if (maintenance && (!currentUser || currentUser.role !== 'admin')) {
                    document.getElementById('maintenance-screen').style.display = 'flex';
                } else {
                    document.getElementById('maintenance-screen').style.display = 'none';
                }
                document.getElementById('site-phone').innerText = s.phone || '380998183988';
                document.getElementById('promo-text').innerText = s.promoText || 'Кращі ціни на запчастини';
            }
        });

        // Функція парсингу характеристик
        function parseSpecs(specsText) {
            if (!specsText) return [];
            return specsText.split('\n').map(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    return { name: parts[0].trim(), value: parts.slice(1).join(':').trim() };
                } else {
                    return { name: '', value: line.trim() };
                }
            }).filter(item => item.name || item.value);
        }

        // Завантаження всіх товарів для блоку "Схожі товари"
        let allProducts = [];
        onValue(ref(db, 'products'), (snap) => {
            const data = snap.val();
            if (data) {
                allProducts = Object.keys(data).map(id => ({ id, ...data[id] }));
                if (window.currentProductId) {
                    renderRelated(allProducts.filter(p => p.id !== window.currentProductId).slice(0, 4));
                }
            }
        });

        // Відображення схожих товарів
        function renderRelated(products) {
            const container = document.getElementById('related-products');
            if (!container) return;
            if (products.length === 0) {
                container.innerHTML = '<p>Немає схожих товарів</p>';
                return;
            }
            container.innerHTML = products.map(p => {
                const imageHtml = p.imageUrl ? 
                    `<img src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fa-solid ${p.icon || 'fa-box'}\'></i>';">` : 
                    `<i class="fa-solid ${p.icon || 'fa-box'}"></i>`;
                return `
                    <a href="product.html?id=${p.id}" class="related-card">
                        <div class="related-img">${imageHtml}</div>
                        <div class="related-title">${p.name}</div>
                        <div class="related-price">${p.price} грн</div>
                    </a>
                `;
            }).join('');
        }

        // ========== ВІДГУКИ ==========
        function renderStars(rating) {
            const full = '★'.repeat(Math.floor(rating));
            const half = rating % 1 >= 0.5 ? '½' : '';
            const empty = '☆'.repeat(5 - Math.ceil(rating));
            return full + half + empty;
        }

        function loadReviews(productId) {
            onValue(ref(db, 'reviews'), (snap) => {
                const allReviews = snap.val() || {};
                const productReviews = Object.entries(allReviews)
                    .filter(([_, r]) => r.productId === productId && r.visible === true)
                    .map(([id, r]) => ({ id, ...r }))
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                // Оновлюємо середній рейтинг з товару
                onValue(ref(db, 'products/' + productId), (snap) => {
                    const product = snap.val();
                    if (product) {
                        document.getElementById('avg-stars').textContent = renderStars(product.rating || 0);
                        document.getElementById('avg-rating').textContent = (product.rating || 0).toFixed(1);
                        document.getElementById('reviews-count').textContent = `(${product.reviewsCount || 0} відгуків)`;
                    }
                }, { onlyOnce: true });

                const listDiv = document.getElementById('reviews-list');
                if (productReviews.length === 0) {
                    listDiv.innerHTML = '<p style="text-align:center; padding:20px; background:#f9f9f9; border-radius:20px;">Поки що немає відгуків. Будьте першим!</p>';
                    return;
                }

                listDiv.innerHTML = productReviews.map(r => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-name">${r.userName}</span>
                            <span class="review-date">${new Date(r.date).toLocaleDateString('uk-UA')}</span>
                        </div>
                        <div class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                        <div class="review-text">${r.text}</div>
                    </div>
                `).join('');
            });
        }

        // Отримуємо ID товару з URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            window.currentProductId = productId;
            onValue(ref(db, 'products/' + productId), (snapshot) => {
                const product = snapshot.val();
                const mainDiv = document.getElementById('product-main');
                if (product) {
                    document.getElementById('breadcrumb-product').innerText = product.name;

                    const imageHtml = product.imageUrl ? 
                        `<img src="${product.imageUrl}" alt="${product.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fa-solid ${product.icon || 'fa-box'}\'></i>';">` : 
                        `<i class="fa-solid ${product.icon || 'fa-box'}"></i>`;

                    const stockHtml = product.stock > 0
                        ? `<span class="stock-badge in-stock"><i class="fa-solid fa-check-circle"></i> В наявності (${product.stock} шт.)</span>`
                        : `<span class="stock-badge out-stock"><i class="fa-solid fa-times-circle"></i> Немає в наявності</span>`;

                    const metaHtml = `
                        ${product.article ? `<div class="meta-item"><i class="fa-solid fa-barcode"></i> Арт: ${product.article}</div>` : ''}
                        ${product.brand ? `<div class="meta-item"><i class="fa-solid fa-tag"></i> Бренд: ${product.brand}</div>` : ''}
                    `;

                    const priceHtml = `
                        <div class="price-block">
                            ${product.old_price ? `<span class="old-price">${Number(product.old_price).toLocaleString('uk-UA')} грн</span>` : ''}
                            <span class="product-price">${Number(product.price).toLocaleString('uk-UA')} грн</span>
                        </div>
                    `;

                    const specs = parseSpecs(product.specs);
                    const specsHtml = specs.length > 0 ? specs.map(s => `
                        <div class="spec-row">
                            <span class="spec-name">${s.name}</span>
                            <span class="spec-value">${s.value}</span>
                        </div>
                    `).join('') : '<p>Характеристики не вказані</p>';

                    // Додаємо блок відгуків
                    mainDiv.innerHTML = `
                        <div class="product-wrapper">
                            <div class="product-grid">
                                <div class="gallery">
                                    <div class="main-image">${imageHtml}</div>
                                    <div class="thumbnails">
                                        <div class="thumbnail active"><i class="fa-solid ${product.icon || 'fa-box'}"></i></div>
                                        <div class="thumbnail"><i class="fa-solid fa-cog"></i></div>
                                        <div class="thumbnail"><i class="fa-solid fa-oil-can"></i></div>
                                    </div>
                                </div>
                                <div class="product-info">
                                    <h1 class="product-title">${product.name}</h1>
                                    <div class="product-meta">${metaHtml}</div>
                                    ${priceHtml}
                                    <div class="product-stock">${stockHtml}</div>
                                    <div class="product-actions">
                                        <button class="btn-buy" onclick="addToCart({
                                            id: '${productId}',
                                            name: '${product.name.replace(/'/g, "\\'")}',
                                            price: ${product.price},
                                            icon: '${product.icon || 'fa-box'}',
                                            imageUrl: '${product.imageUrl || ''}'
                                        })">Купити</button>
                                        <button class="btn-wish"><i class="fa-regular fa-heart"></i></button>
                                    </div>
                                </div>
                            </div>

                            <div class="tabs">
                                <div class="tab-headers">
                                    <div class="tab-header active" data-tab="desc">Опис</div>
                                    <div class="tab-header" data-tab="specs">Характеристики</div>
                                </div>
                                <div class="tab-content active" id="tab-desc">
                                    <div class="desc-content">${product.desc || 'Опис відсутній'}</div>
                                </div>
                                <div class="tab-content" id="tab-specs">
                                    <div class="specs-grid">${specsHtml}</div>
                                </div>
                            </div>
                        </div>

                        <div class="related">
                            <h2>Схожі товари</h2>
                            <div class="related-grid" id="related-products"></div>
                        </div>

                        <!-- Блок відгуків (красивий) -->
                        <div class="reviews-section">
                            <h2>Відгуки покупців</h2>
                            <div class="average-rating">
                                <span class="rating-stars" id="avg-stars">☆☆☆☆☆</span>
                                <span class="rating-value" id="avg-rating">0.0</span>
                                <span class="reviews-count" id="reviews-count">(0 відгуків)</span>
                            </div>
                            <div id="reviews-list" class="reviews-list"></div>
                            <div class="add-review">
                                <h3>Залишити відгук</h3>
                                <form id="review-form">
                                    <div class="form-group">
                                        <label for="review-name">Ваше ім'я</label>
                                        <input type="text" id="review-name" placeholder="Наприклад, Олександр" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Оцінка</label>
                                        <div class="rating-select">
                                            <span class="star" data-value="1">☆</span>
                                            <span class="star" data-value="2">☆</span>
                                            <span class="star" data-value="3">☆</span>
                                            <span class="star" data-value="4">☆</span>
                                            <span class="star" data-value="5">☆</span>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="review-text">Ваш відгук</label>
                                        <textarea id="review-text" placeholder="Поділіться враженнями про товар..." rows="4" required></textarea>
                                    </div>
                                    <button type="submit" class="btn-primary">Надіслати відгук</button>
                                </form>
                            </div>
                        </div>
                    `;

                    // Логіка перемикання вкладок
                    document.querySelectorAll('.tab-header').forEach(header => {
                        header.addEventListener('click', () => {
                            document.querySelectorAll('.tab-header').forEach(h => h.classList.remove('active'));
                            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                            header.classList.add('active');
                            const tabId = header.dataset.tab;
                            document.getElementById(`tab-${tabId}`).classList.add('active');
                        });
                    });

                    // Оновлюємо рекомендації (виключаємо поточний товар)
                    const otherProducts = allProducts.filter(p => p.id !== productId).slice(0, 4);
                    renderRelated(otherProducts);

                    // ===== ВІДГУКИ: ініціалізація =====
                    loadReviews(productId);

                    // Вибір зірок (красива анімація)
                    const stars = document.querySelectorAll('.rating-select .star');
                    let selectedRating = 0;
                    stars.forEach(star => {
                        star.addEventListener('click', () => {
                            selectedRating = parseInt(star.dataset.value);
                            stars.forEach((s, index) => {
                                if (index < selectedRating) {
                                    s.textContent = '★';
                                    s.classList.add('selected');
                                } else {
                                    s.textContent = '☆';
                                    s.classList.remove('selected');
                                }
                            });
                        });
                    });

                    // Відправка форми
                    const reviewForm = document.getElementById('review-form');
                    reviewForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const name = document.getElementById('review-name').value.trim();
                        const text = document.getElementById('review-text').value.trim();
                        if (!name || !text || selectedRating === 0) {
                            alert('Будь ласка, заповніть всі поля та поставте оцінку');
                            return;
                        }

                        const review = {
                            productId: productId,
                            userName: name,
                            rating: selectedRating,
                            text: text,
                            date: new Date().toISOString(),
                            moderated: false,
                            visible: false
                        };

                        try {
                            await push(ref(db, 'reviews'), review);
                            alert('Дякуємо! Ваш відгук відправлено на модерацію.');
                            reviewForm.reset();
                            selectedRating = 0;
                            stars.forEach(s => {
                                s.textContent = '☆';
                                s.classList.remove('selected');
                            });
                        } catch (error) {
                            alert('Помилка: ' + error.message);
                        }
                    });

                } else {
                    mainDiv.innerHTML = `
                        <div class="not-found" style="text-align: center; padding: 80px 20px; background: white; border-radius: var(--border-radius);">
                            <h2>Товар не знайдено</h2>
                            <p>Можливо, його було видалено або сталася помилка.</p>
                            <a href="index.html" class="back-link" style="display: inline-block; margin-top: 20px; color: var(--mz-red);">Повернутися до каталогу</a>
                        </div>
                    `;
                }
            });
        } else {
            document.getElementById('product-main').innerHTML = `
                <div class="not-found" style="text-align: center; padding: 80px 20px; background: white; border-radius: var(--border-radius);">
                    <h2>ID товару не вказано</h2>
                    <a href="index.html" class="back-link" style="display: inline-block; margin-top: 20px; color: var(--mz-red);">Повернутися до каталогу</a>
                </div>
            `;
        }

        // Пошук (перенаправлення на головну)
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                window.location.href = 'index.html?search=' + encodeURIComponent(e.target.value);
            }
        });
    </script>
</body>
</html>
