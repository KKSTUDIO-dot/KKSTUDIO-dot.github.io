<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар | Arzmob Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><i class="fas fa-store"></i> Arzmob</div>
            <a href="javascript:history.back()" class="btn-secondary"><i class="fas fa-arrow-left"></i> Назад</a>
        </div>

        <div id="productContainer" style="background:white; border-radius:20px; padding:30px; border:1px solid #dee2e6;">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
        </div>

        <div class="watermark">
            <i class="fas fa-store"></i> Arzmob Store 2026
        </div>
    </div>

    <script type="module">
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getCurrentUser, addToHistory } from './helpers.js';
        import { db } from './firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        const container = document.getElementById('productContainer');

        if (!itemId) {
            container.innerHTML = '<div class="error">Товар не указан</div>';
        } else {
            const itemRef = ref(db, `items/${itemId}`);
            const snap = await get(itemRef);
            const data = snap.val();
            if (!data) {
                container.innerHTML = '<div class="error">Товар не найден</div>';
            } else {
                await update(itemRef, { views: (data.views || 0) + 1 });
                addToHistory(itemId);

                const price = data.price.toLocaleString();
                const date = new Date(data.timestamp).toLocaleString();

                let typeClass, typeIcon, typeLabel;
                switch (data.type) {
                    case 'sale': typeClass = 'type-sale'; typeIcon = 'fa-tag'; typeLabel = 'Продажа'; break;
                    case 'buy': typeClass = 'type-buy'; typeIcon = 'fa-cart-shopping'; typeLabel = 'Покупка'; break;
                    case 'rent': typeClass = 'type-rent'; typeIcon = 'fa-hand-holding-dollar'; typeLabel = 'Аренда'; break;
                    case 'ad': typeClass = 'type-ad'; typeIcon = 'fa-bullhorn'; typeLabel = 'Реклама'; break;
                    default: typeClass = ''; typeIcon = 'fa-question'; typeLabel = data.type;
                }

                let categoryLabel = '';
                switch (data.category) {
                    case 'accessories': categoryLabel = 'Аксессуары'; break;
                    case 'resources': categoryLabel = 'Ресурсы'; break;
                    case 'realty': categoryLabel = 'Недвижимость'; break;
                    case 'transport': categoryLabel = 'Транспорт'; break;
                }

                let imagesHtml = '';
                if (data.images && data.images.length) {
                    imagesHtml = '<div style="display:flex; gap:10px; overflow-x:auto; margin-bottom:20px;">' +
                        data.images.map(url => `<img src="${url}" style="width:200px; height:200px; object-fit:cover; border-radius:12px;">`).join('') +
                        '</div>';
                }

                const user = getCurrentUser();
                const contactHtml = user ? `<button class="btn-primary" style="margin-top:20px;" id="contactBtn"><i class="fab fa-whatsapp"></i> Связаться с продавцом</button>` : '';

                const html = `
                    ${imagesHtml}
                    <span class="item-type ${typeClass}" style="font-size:1rem; padding:8px 20px;"><i class="fas ${typeIcon}"></i> ${typeLabel}</span>
                    <h1 style="font-size:2rem; margin:15px 0;">${escapeHtml(data.name)}</h1>
                    <div style="font-size:2rem; color:#28a745; font-weight:700; margin-bottom:20px;"><i class="fas fa-coins"></i> ${price}</div>
                    <div style="font-size:1.1rem; line-height:1.6; margin:25px 0; padding:20px 0; border-top:1px solid #dee2e6; border-bottom:1px solid #dee2e6;">${escapeHtml(data.description) || 'Нет описания'}</div>
                    <div style="color:#6c757d; display:flex; gap:20px; flex-wrap:wrap;">
                        <span><i class="fas fa-tags"></i> ${categoryLabel}</span>
                        <span><i class="far fa-user"></i> Продавец: ${data.userNick || 'Неизвестно'}</span>
                        <span><i class="far fa-clock"></i> Добавлено: ${date}</span>
                        <span><i class="far fa-eye"></i> Просмотров: ${(data.views || 0) + 1}</span>
                    </div>
                    ${contactHtml}
                `;
                container.innerHTML = html;

                if (user) {
                    document.getElementById('contactBtn')?.addEventListener('click', () => {
                        alert(`Свяжитесь с продавцом ${data.userNick} через личные сообщения (функция в разработке)`);
                    });
                }
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }
    </script>
</body>
</html>
