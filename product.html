<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Товар | Arzmob Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #dee2e6;
            border-top-color: #6c757d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>

    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="icon-btn" onclick="history.back()" title="Назад"><i class="fas fa-arrow-left"></i></button>
                <div class="logo"><i class="fas fa-store"></i> Arzmob</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="closeTelegramBtn" title="Закрыть" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div id="productContainer" style="background: white; border-radius: 20px; padding: 30px; border: 1px solid #dee2e6; margin-bottom: 20px;">
            <div class="loading" style="text-align: center; padding: 40px;">
                <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: #6c757d;"></i>
                <p>Загрузка...</p>
            </div>
        </div>

        <div class="watermark"><i class="fas fa-store"></i> Arzmob Store 2026</div>
    </div>

    <script>
        (function() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                const closeBtn = document.getElementById('closeTelegramBtn');
                if (closeBtn) {
                    closeBtn.style.display = 'inline-flex';
                    closeBtn.addEventListener('click', () => Telegram.WebApp.close());
                }
                Telegram.WebApp.setHeaderColor('#6c757d');
                Telegram.WebApp.setBackgroundColor('#e9ecef');
            }
            window.addEventListener('load', () => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => document.getElementById('preloader').style.display = 'none', 300);
            });
        })();
    </script>

    <script type="module">
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getCurrentUser, addToHistory, getUserData } from './helpers.js';
        import { db } from './firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        const container = document.getElementById('productContainer');

        if (!itemId) {
            container.innerHTML = '<div class="error">Товар не указан</div>';
        } else {
            const itemRef = ref(db, `items/${itemId}`);
            const snap = await get(itemRef);
            const item = snap.val();
            if (!item) {
                container.innerHTML = '<div class="error">Товар не найден</div>';
            } else {
                await update(itemRef, { views: (item.views || 0) + 1 });
                addToHistory(itemId);

                const price = item.price.toLocaleString();
                const date = new Date(item.timestamp).toLocaleString();

                // Получаем данные продавца (включая telegram)
                const sellerData = await getUserData(item.userId);
                const sellerTelegram = sellerData?.telegram || item.contact || ''; // item.contact может быть из старого формата

                let typeClass, typeIcon, typeLabel;
                switch (item.type) {
                    case 'sale': typeClass = 'type-sale'; typeIcon = 'fa-tag'; typeLabel = 'Продажа'; break;
                    case 'buy': typeClass = 'type-buy'; typeIcon = 'fa-cart-shopping'; typeLabel = 'Покупка'; break;
                    case 'rent': typeClass = 'type-rent'; typeIcon = 'fa-hand-holding-dollar'; typeLabel = 'Аренда'; break;
                    case 'ad': typeClass = 'type-ad'; typeIcon = 'fa-bullhorn'; typeLabel = 'Реклама'; break;
                    default: typeClass = ''; typeIcon = 'fa-question'; typeLabel = item.type;
                }

                let categoryLabel = '';
                switch (item.category) {
                    case 'accessories': categoryLabel = 'Аксессуары'; break;
                    case 'resources': categoryLabel = 'Ресурсы'; break;
                    case 'realty': categoryLabel = 'Недвижимость'; break;
                    case 'transport': categoryLabel = 'Транспорт'; break;
                    default: categoryLabel = item.category;
                }

                let imagesHtml = '';
                if (item.images && item.images.length) {
                    imagesHtml = '<div style="display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px;">' +
                        item.images.map(url => `<img src="${url}" style="width:200px; height:200px; object-fit:cover; border-radius:12px;">`).join('') +
                        '</div>';
                }

                // Кнопка связи
                let contactHtml = '';
                if (sellerTelegram) {
                    // Очищаем от @ и пробелов
                    const tg = sellerTelegram.replace('@', '').trim();
                    if (tg) {
                        contactHtml = `
                            <a href="https://t.me/${tg}" target="_blank" class="btn-primary" style="display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; text-decoration: none;">
                                <i class="fab fa-telegram"></i> Связаться в Telegram
                            </a>
                        `;
                    }
                } else {
                    contactHtml = `<p style="margin-top:20px; color:#6c757d;">Продавец не указал контакт. Попробуйте связаться через комментарии (функция в разработке).</p>`;
                }

                const html = `
                    ${imagesHtml}
                    <span class="item-type ${typeClass}" style="font-size:1rem; padding:8px 20px;"><i class="fas ${typeIcon}"></i> ${typeLabel}</span>
                    <h1 style="font-size:2rem; margin:15px 0;">${escapeHtml(item.name)}</h1>
                    <div style="font-size:2rem; color:#28a745; font-weight:700; margin-bottom:20px;"><i class="fas fa-coins"></i> ${price}</div>
                    <div style="font-size:1.1rem; line-height:1.6; margin:25px 0; padding:20px 0; border-top:1px solid #dee2e6; border-bottom:1px solid #dee2e6;">
                        ${escapeHtml(item.description) || 'Нет описания'}
                    </div>
                    <div style="color:#6c757d; display:flex; gap:20px; flex-wrap:wrap;">
                        <span><i class="fas fa-tags"></i> ${categoryLabel}</span>
                        <span><i class="far fa-user"></i> Продавец: ${item.userNick || 'Неизвестно'}</span>
                        <span><i class="far fa-clock"></i> Добавлено: ${date}</span>
                        <span><i class="far fa-eye"></i> Просмотров: ${(item.views || 0) + 1}</span>
                    </div>
                    ${contactHtml}
                `;
                container.innerHTML = html;
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }
    </script>
</body>
</html>
