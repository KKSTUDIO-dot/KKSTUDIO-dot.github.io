<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание администратора Arzmob Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 50px; background: #f0f2f5; margin: 0; }
        .card { background: white; max-width: 500px; margin: 0 auto; border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { color: #1a1a2e; font-size: 2em; }
        .success { color: #28a745; font-weight: 600; }
        .error { color: #dc3545; font-weight: 600; }
        .info { color: #666; margin-top: 20px; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #ccc; border-top-color: #0d6efd; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚙️ Arzmob Admin</h1>
        <div id="status" class="info">Выполняется настройка...</div>
        <div class="spinner" id="spinner"></div>
        <div id="result"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Конфигурация Firebase (из вашего проекта)
        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Функция хеширования SHA-256 (как в helpers.js)
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Данные администратора
        const ADMIN_NICK = "Derrick_Scaletta";
        const ADMIN_PASS = "zxczxc";

        (async () => {
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const users = snapshot.val() || {};

                let found = false;
                for (let id in users) {
                    if (users[id].nick === ADMIN_NICK) {
                        // Пользователь существует – обновляем роль
                        await set(ref(db, `users/${id}/role`), "admin");
                        document.getElementById('status').innerHTML = '<span class="success">✅ Пользователь уже существовал, теперь он администратор.</span>';
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    // Создаём нового пользователя с ролью admin
                    const hashed = await hashPassword(ADMIN_PASS);
                    const newUserRef = ref(db, 'users/' + Date.now());
                    await set(newUserRef, {
                        nick: ADMIN_NICK,
                        password: hashed,
                        role: "admin",
                        registered: Date.now()
                    });
                    document.getElementById('status').innerHTML = '<span class="success">✅ Новый администратор успешно создан.</span>';
                }

                document.getElementById('spinner').style.display = 'none';
                document.getElementById('result').innerHTML = '<p class="info">Теперь вы можете войти с ником <strong>Derrick_Scaletta</strong> и паролем <strong>zxczxc</strong>.</p>';
            } catch (error) {
                document.getElementById('status').innerHTML = `<span class="error">❌ Ошибка: ${error.message}</span>`;
                document.getElementById('spinner').style.display = 'none';
                console.error(error);
            }
        })();
    </script>
</body>
</html>
