<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ArzMob - Публикация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <main id="main-content">
            <div class="publish-container">
                <h1>Новое объявление</h1>
                <form id="publish-form">
                    <div class="form-group">
                        <label for="pub-category">Категория</label>
                        <select id="pub-category" required>
                            <option value="sale">Продажа</option>
                            <option value="buy">Покупка</option>
                            <option value="rent">Аренда</option>
                            <option value="ad">Реклама</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pub-text">Описание</label>
                        <textarea id="pub-text" rows="5" placeholder="Введите описание товара или услуги..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="pub-image">Фото (необязательно)</label>
                        <input type="file" id="pub-image" accept="image/jpeg,image/png,image/webp">
                        <div id="image-preview" class="image-preview"></div>
                    </div>
                    <div class="form-buttons">
                        <button type="button" id="cancel-publish" class="btn-secondary">Отмена</button>
                        <button type="submit" id="submit-publish" class="btn-primary">Опубликовать</button>
                    </div>
                </form>
                <div id="publish-status" class="status-message"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            <a href="tovars.html" class="nav-item">
                <i class="fas fa-store"></i>
                <span>Товары</span>
            </a>
            <a href="publick.html" class="nav-item active">
                <i class="fas fa-plus-circle"></i>
                <span>Добавить</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
        </nav>
    </div>

    <script type="module" src="publick.js"></script>
</body>
</html>
