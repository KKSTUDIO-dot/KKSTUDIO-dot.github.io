<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новое объявление | Arzmob Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center;">
        <div class="form-container">
            <h1><i class="fas fa-plus-circle"></i> Создать объявление</h1>
            <div class="subtitle">Заполните информацию</div>

            <div class="form-group">
                <label>Название</label>
                <input type="text" id="name" placeholder="Например: M4A1">
            </div>
            <div class="form-group">
                <label>Цена</label>
                <input type="number" id="price" min="0" step="1" placeholder="0">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="category">
                    <option value="accessories">Аксессуары</option>
                    <option value="resources">Ресурсы</option>
                    <option value="realty">Недвижимость</option>
                    <option value="transport">Транспорт</option>
                </select>
            </div>
            <div class="form-group">
                <label>Тип сделки</label>
                <select id="type">
                    <option value="sale">Продажа</option>
                    <option value="buy">Покупка</option>
                    <option value="rent">Аренда</option>
                    <option value="ad">Реклама</option>
                </select>
            </div>
            <div class="form-group">
                <label>Описание (необязательно)</label>
                <textarea id="desc" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Изображения (до 3 шт)</label>
                <input type="file" id="images" accept="image/*" multiple>
                <div id="preview"></div>
            </div>
            <button class="btn-primary" id="publishBtn"><i class="fas fa-cloud-upload-alt"></i> Опубликовать</button>
        </div>
    </div>

    <script type="module">
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getCurrentUser } from './helpers.js';
        import { db, storage } from './firebase-config.js';

        const user = getCurrentUser();
        if (!user) window.location.href = 'login.html';

        document.getElementById('images').addEventListener('change', function(e) {
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            for (let i = 0; i < Math.min(this.files.length, 3); i++) {
                const file = this.files[i];
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('publishBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const price = document.getElementById('price').value.trim();
            const category = document.getElementById('category').value;
            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value.trim();
            const files = document.getElementById('images').files;

            if (!name || !price) {
                alert('Заполните название и цену');
                return;
            }

            const newItemRef = push(ref(db, 'items'));
            const itemId = newItemRef.key;

            const imageUrls = [];
            for (let i = 0; i < Math.min(files.length, 3); i++) {
                const file = files[i];
                const imgRef = storageRef(storage, `items/${itemId}/${i}`);
                try {
                    await uploadBytes(imgRef, file);
                    const url = await getDownloadURL(imgRef);
                    imageUrls.push(url);
                } catch (e) {
                    console.error('Ошибка загрузки', e);
                }
            }

            await set(newItemRef, {
                name,
                price: Number(price),
                category,
                type,
                description: desc,
                userId: user.userId,
                userNick: user.userNick,
                timestamp: Date.now(),
                status: 'pending',
                views: 0,
                images: imageUrls,
                server: 'Arizona Mobile 1'
            });

            alert('Объявление отправлено на модерацию');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
