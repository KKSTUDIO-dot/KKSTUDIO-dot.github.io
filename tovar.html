<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Новое объявление | Arzmob Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #dee2e6;
            border-top-color: #6c757d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>

    <div class="page-container">
        <!-- Кнопка "Назад" -->
        <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i></a>

        <div class="container" style="display: flex; justify-content: center; flex-direction: column; align-items: center;">
            <div class="form-container">
                <h1><i class="fas fa-plus-circle"></i> Создать объявление</h1>
                <div class="subtitle">Заполните информацию о товаре или услуге</div>

                <div class="form-group">
                    <label>Название предмета</label>
                    <input type="text" id="name" placeholder="Например: M4A1, Бронежилет">
                </div>

                <div class="form-group">
                    <label>Цена</label>
                    <input type="number" id="price" min="0" step="1" placeholder="0">
                </div>

                <div class="form-group">
                    <label>Категория</label>
                    <select id="category">
                        <option value="accessories">Аксессуары</option>
                        <option value="resources">Ресурсы</option>
                        <option value="realty">Недвижимость</option>
                        <option value="transport">Транспорт</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Тип сделки</label>
                    <select id="type">
                        <option value="sale">Продажа</option>
                        <option value="buy">Покупка</option>
                        <option value="rent">Аренда</option>
                        <option value="ad">Реклама</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Описание (необязательно)</label>
                    <textarea id="desc" placeholder="Состояние, характеристики..."></textarea>
                </div>

                <div class="form-group">
                    <label>Telegram для связи (необязательно)</label>
                    <input type="text" id="telegram" placeholder="@username или номер телефона">
                    <small style="color:#6c757d;">Укажите контакт, чтобы покупатели могли связаться</small>
                </div>

                <div class="form-group">
                    <label>Изображения (до 3 шт)</label>
                    <input type="file" id="images" accept="image/*" multiple>
                    <div id="preview"></div>
                </div>

                <button class="btn-primary" id="publishBtn"><i class="fas fa-cloud-upload-alt"></i> Опубликовать</button>
            </div>

            <div class="watermark"><i class="fas fa-store"></i> Arzmob Store 2026</div>
        </div>

        <!-- Нижняя панель (рынок, профиль) -->
        <div class="bottom-nav">
            <a href="index.html" class="bottom-nav-item">
                <i class="fas fa-store"></i>
                <span>Рынок</span>
            </a>
            <a href="profile.html" class="bottom-nav-item">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
        </div>
    </div>

    <script>
        (function() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                Telegram.WebApp.setHeaderColor('#6c757d');
                Telegram.WebApp.setBackgroundColor('#e9ecef');
                // Кнопка закрытия Telegram
                const closeBtn = document.createElement('button');
                closeBtn.className = 'icon-btn';
                closeBtn.innerHTML = '<i class="fas fa-times"></i>';
                closeBtn.title = 'Закрыть';
                closeBtn.style.position = 'fixed';
                closeBtn.style.top = 'calc(12px + env(safe-area-inset-top, 0px))';
                closeBtn.style.right = '12px';
                closeBtn.style.zIndex = '1002';
                closeBtn.onclick = () => Telegram.WebApp.close();
                document.body.appendChild(closeBtn);
            }
            window.addEventListener('load', () => {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 300);
                }
            });
        })();
    </script>

    <script type="module">
        import { ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { requireAuth } from './helpers.js';
        import { db, storage } from './firebase-config.js';

        // Проверяем авторизацию (только Telegram)
        const user = requireAuth();
        if (!user) {
            // requireAuth уже перенаправит на главную, но на всякий случай
            window.location.href = 'index.html';
        }

        // Превью изображений
        document.getElementById('images').addEventListener('change', function(e) {
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            for (let i = 0; i < Math.min(this.files.length, 3); i++) {
                const file = this.files[i];
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('publishBtn').addEventListener('click', async () => {
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Публикация...';

            try {
                const name = document.getElementById('name').value.trim();
                const price = document.getElementById('price').value.trim();
                const category = document.getElementById('category').value;
                const type = document.getElementById('type').value;
                const desc = document.getElementById('desc').value.trim();
                const telegram = document.getElementById('telegram').value.trim().replace('@', '');
                const files = document.getElementById('images').files;

                if (!name || !price) {
                    alert('Заполните название и цену');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Опубликовать';
                    return;
                }

                if (files.length > 3) {
                    alert('Максимум 3 изображения');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Опубликовать';
                    return;
                }
                for (let i = 0; i < files.length; i++) {
                    if (!files[i].type.startsWith('image/')) {
                        alert('Разрешены только изображения');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Опубликовать';
                        return;
                    }
                    if (files[i].size > 5 * 1024 * 1024) {
                        alert('Размер каждого изображения не должен превышать 5 МБ');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Опубликовать';
                        return;
                    }
                }

                const newItemRef = push(ref(db, 'items'));
                const itemId = newItemRef.key;

                const imageUrls = [];
                for (let i = 0; i < Math.min(files.length, 3); i++) {
                    const file = files[i];
                    const imgRef = storageRef(storage, `items/${itemId}/${i}`);
                    await uploadBytes(imgRef, file);
                    const url = await getDownloadURL(imgRef);
                    imageUrls.push(url);
                }

                await set(newItemRef, {
                    name,
                    price: Number(price),
                    category,
                    type,
                    description: desc,
                    userId: user.userId,
                    userNick: user.userNick,
                    timestamp: Date.now(),
                    status: 'pending',
                    views: 0,
                    images: imageUrls,
                    server: 'Arizona Mobile 1',
                    contact: telegram || ''
                });

                alert('Объявление отправлено на модерацию');
                window.location.href = 'index.html';
            } catch (err) {
                console.error(err);
                alert('Ошибка: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Опубликовать';
            }
        });
    </script>
</body>
</html>
