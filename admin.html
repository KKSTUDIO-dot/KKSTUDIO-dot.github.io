<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arizona RP | Админ-панель</title>
    <link rel="stylesheet" href="style/main.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h3><i class="fas fa-clock"></i> Ожидают модерации</h3>
        <div id="pendingAds" class="ads-grid"></div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Главная</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </a>
        <a href="admin.html" class="nav-item active">
            <i class="fas fa-shield-alt"></i>
            <span>Админка</span>
        </a>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { ensureUserProfile, moderateAd } from "./utils.js";
        import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentUser = null;

        const typeNames = {
            sale: "💰 Продажа",
            purchase: "🛍️ Покупка",
            rent: "🏷️ Аренда",
            advertising: "📢 Реклама"
        };
        const categoryNames = {
            transport: "🚗 Транспорт",
            resources: "⛏️ Ресурсы",
            houses: "🏠 Дома",
            accessories: "👕 Аксессуары",
            businesses: "🏢 Бизнесы",
            advertising: "📢 Реклама"
        };

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderPendingAds(ads) {
            const container = document.getElementById("pendingAds");
            const pending = ads.filter(ad => ad.status === "pending");
            if (pending.length === 0) {
                container.innerHTML = '<div class="empty-state">✅ Нет объявлений на модерацию</div>';
                return;
            }
            container.innerHTML = pending.map(ad => `
                <div class="ad-card">
                    <div class="ad-title"><i class="fas ${ad.icon || 'fa-tag'}"></i> ${escapeHtml(ad.title)}</div>
                    <div class="ad-price">${Number(ad.price).toLocaleString()} $</div>
                    <div class="ad-desc">${escapeHtml(ad.description)}</div>
                    <div class="ad-meta">
                        <span class="badge-category">${categoryNames[ad.category] || ad.category}</span>
                        <span class="badge-type">${typeNames[ad.type] || ad.type}</span>
                        <span>Пользователь: ${ad.userId}</span>
                    </div>
                    <div class="admin-actions">
                        <button class="btn-approve" data-id="${ad.id}">✅ Одобрить</button>
                        <button class="btn-reject" data-id="${ad.id}">❌ Отклонить</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', () => moderate(btn.dataset.id, 'approved'));
            });
            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', () => moderate(btn.dataset.id, 'rejected'));
            });
        }

        async function moderate(adId, newStatus) {
            if (!currentUser) return;
            await moderateAd(adId, newStatus, currentUser.id);
            tg.showPopup({
                title: "Успешно",
                message: `Объявление ${newStatus === 'approved' ? 'одобрено' : 'отклонено'}`,
                buttons: [{ type: "ok" }]
            });
        }

        async function init() {
            currentUser = await ensureUserProfile();
            const adsRef = ref(db, 'ads');
            onValue(adsRef, (snapshot) => {
                const data = snapshot.val();
                renderPendingAds(data ? Object.values(data) : []);
            });
        }

        init();
    </script>
</body>
</html>
