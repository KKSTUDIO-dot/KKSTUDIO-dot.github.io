<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Админка | Arzmob Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #dee2e6;
            border-top-color: #6c757d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tabs {
            display: flex;
            gap: 4px;
            background: #f8f9fa;
            padding: 4px;
            border-radius: 40px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            color: #495057;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .tab-btn:hover { background: #e9ecef; }
        .tab-btn.active { background: #6c757d; color: white; }

        .tab-content.hidden { display: none; }
        .access-error {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 24px;
            max-width: 400px;
            margin: 50px auto;
        }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>

    <!-- Основной контент (скрыт до проверки прав) -->
    <div class="container" id="mainContainer" style="display: none;">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="icon-btn" onclick="history.back()" title="Назад"><i class="fas fa-arrow-left"></i></button>
                <div class="logo"><i class="fas fa-shield-alt"></i> Arzmob Admin</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="closeTelegramBtn" title="Закрыть" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-box"></i><div class="stat-value" id="totalItems">0</div><div class="stat-label">Всего товаров</div></div>
            <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-value" id="pendingItems">0</div><div class="stat-label">На модерации</div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-value" id="approvedItems">0</div><div class="stat-label">Одобрено</div></div>
            <div class="stat-card"><i class="fas fa-users"></i><div class="stat-value" id="totalUsers">0</div><div class="stat-label">Пользователей</div></div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="moderate">Модерация</button>
            <button class="tab-btn" data-tab="all">Все товары</button>
            <button class="tab-btn" data-tab="users">Пользователи</button>
            <button class="tab-btn" data-tab="logs">Логи</button>
        </div>

        <!-- Вкладка Модерация -->
        <div id="tab-moderate" class="tab-content">
            <h2><i class="fas fa-clock"></i> На модерации</h2>
            <div id="itemsContainer" class="items-grid"><div class="no-items"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>
        </div>

        <!-- Вкладка Все товары -->
        <div id="tab-all" class="tab-content hidden">
            <h2><i class="fas fa-boxes"></i> Все товары</h2>
            <div id="allItemsContainer" class="items-grid"><div class="no-items"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>
        </div>

        <!-- Вкладка Пользователи -->
        <div id="tab-users" class="tab-content hidden">
            <h2><i class="fas fa-users"></i> Пользователи</h2>
            <div id="usersList" style="background:white; border-radius:16px; padding:20px; border:1px solid #dee2e6;"></div>
        </div>

        <!-- Вкладка Логи -->
        <div id="tab-logs" class="tab-content hidden">
            <h2><i class="fas fa-history"></i> Последние действия</h2>
            <div class="logs-section"><div id="logsList" class="logs-list"></div></div>
        </div>

        <div class="watermark"><i class="fas fa-store"></i> Arzmob Store 2026</div>
    </div>

    <!-- Блок отказа в доступе -->
    <div id="accessDenied" class="access-error" style="display: none;">
        <i class="fas fa-lock" style="font-size: 3rem; color: #dc3545;"></i>
        <h2>Доступ запрещён</h2>
        <p id="accessMessage"></p>
        <button class="btn-primary" onclick="window.location.href='index.html'">На главную</button>
    </div>

    <script>
        setTimeout(() => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 300);
            }
        }, 5000);

        (function() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                const closeBtn = document.getElementById('closeTelegramBtn');
                if (closeBtn) {
                    closeBtn.style.display = 'inline-flex';
                    closeBtn.addEventListener('click', () => Telegram.WebApp.close());
                }
                Telegram.WebApp.setHeaderColor('#6c757d');
                Telegram.WebApp.setBackgroundColor('#e9ecef');
            }
        })();
    </script>

    <script type="module">
        import { getDatabase, ref, onValue, update, remove, push, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as storageRef, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getCurrentUser, isAdmin, telegramAuth, getUserData } from './helpers.js';
        import { db, storage } from './firebase-config.js';

        const mainContainer = document.getElementById('mainContainer');
        const accessDenied = document.getElementById('accessDenied');
        const accessMessage = document.getElementById('accessMessage');

        // Telegram ID, которому разрешён доступ (можно заменить)
        const ALLOWED_TELEGRAM_ID = 8169971367;

        (async function() {
            try {
                // 1. Если не авторизован – пробуем войти через Telegram
                if (!getCurrentUser()) {
                    await telegramAuth();
                }

                const user = getCurrentUser();
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                // 2. Проверяем права
                const admin = await isAdmin(user.userId);
                if (admin) {
                    mainContainer.style.display = 'block';
                } else {
                    const userData = await getUserData(user.userId);
                    if (userData && Number(userData.telegramId) === ALLOWED_TELEGRAM_ID) {
                        mainContainer.style.display = 'block';
                    } else {
                        accessMessage.textContent = 'У вас нет прав доступа к этой странице.';
                        accessDenied.style.display = 'block';
                        return;
                    }
                }

                // ========== КОД АДМИНКИ (статистика, вкладки, модерация) ==========
                const moderateContainer = document.getElementById('itemsContainer');
                const allContainer = document.getElementById('allItemsContainer');
                const usersList = document.getElementById('usersList');
                const logsList = document.getElementById('logsList');
                const totalSpan = document.getElementById('totalItems');
                const pendingSpan = document.getElementById('pendingItems');
                const approvedSpan = document.getElementById('approvedItems');
                const usersSpan = document.getElementById('totalUsers');

                // Переключение вкладок
                const tabs = document.querySelectorAll('.tab-btn');
                const contents = {
                    moderate: document.getElementById('tab-moderate'),
                    all: document.getElementById('tab-all'),
                    users: document.getElementById('tab-users'),
                    logs: document.getElementById('tab-logs')
                };

                tabs.forEach(btn => {
                    btn.addEventListener('click', () => {
                        tabs.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const which = btn.dataset.tab;
                        Object.values(contents).forEach(c => c.classList.add('hidden'));
                        contents[which].classList.remove('hidden');
                        if (which === 'all') loadAllItems();
                        if (which === 'users') loadUsers();
                        if (which === 'logs') loadLogs();
                    });
                });

                // Статистика и модерация
                const itemsRef = ref(db, 'items');
                onValue(itemsRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    const items = Object.entries(data).map(([id, val]) => ({ id, ...val }));

                    totalSpan.textContent = items.length;
                    pendingSpan.textContent = items.filter(i => i.status === 'pending').length;
                    approvedSpan.textContent = items.filter(i => i.status === 'approved').length;

                    const pending = items.filter(i => i.status === 'pending');
                    if (pending.length === 0) {
                        moderateContainer.innerHTML = '<div class="no-items"><i class="fas fa-check-circle"></i> Новых товаров нет</div>';
                    } else {
                        let html = '';
                        pending.forEach(item => {
                            const price = item.price.toLocaleString();
                            const desc = item.description || '';
                            const date = new Date(item.timestamp).toLocaleString();

                            let typeClass, typeIcon, typeLabel;
                            switch (item.type) {
                                case 'sale': typeClass = 'type-sale'; typeIcon = 'fa-tag'; typeLabel = 'Продажа'; break;
                                case 'buy': typeClass = 'type-buy'; typeIcon = 'fa-cart-shopping'; typeLabel = 'Покупка'; break;
                                case 'rent': typeClass = 'type-rent'; typeIcon = 'fa-hand-holding-dollar'; typeLabel = 'Аренда'; break;
                                case 'ad': typeClass = 'type-ad'; typeIcon = 'fa-bullhorn'; typeLabel = 'Реклама'; break;
                                default: typeClass = ''; typeIcon = 'fa-question'; typeLabel = item.type;
                            }

                            html += `
                                <div class="item-card" data-id="${item.id}">
                                    <span class="item-type ${typeClass}"><i class="fas ${typeIcon}"></i> ${typeLabel}</span>
                                    <h3 class="item-title">${escapeHtml(item.name)}</h3>
                                    <div class="item-price"> ${price}</div>
                                    <div class="item-description">${escapeHtml(desc)}</div>
                                    <div class="item-footer">
                                        <span><i class="far fa-user"></i> ${item.userNick || 'Неизвестно'}</span>
                                        <span><i class="far fa-clock"></i> ${date}</span>
                                    </div>
                                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                                        <button class="btn-primary" style="background:#28a745; flex:1;" data-id="${item.id}" id="approve-${item.id}"><i class="fas fa-check"></i> Принять</button>
                                        <button class="btn-primary" style="background:#dc3545; flex:1;" data-id="${item.id}" id="reject-${item.id}"><i class="fas fa-times"></i> Отклонить</button>
                                    </div>
                                </div>
                            `;
                        });
                        moderateContainer.innerHTML = html;

                        pending.forEach(item => {
                            document.getElementById(`approve-${item.id}`)?.addEventListener('click', async () => {
                                if (confirm('Одобрить товар?')) {
                                    await update(ref(db, `items/${item.id}`), { status: 'approved' });
                                    const logRef = push(ref(db, 'logs'));
                                    await set(logRef, { action: 'approve', itemId: item.id, adminId: user.userId, timestamp: Date.now() });
                                }
                            });
                            document.getElementById(`reject-${item.id}`)?.addEventListener('click', async () => {
                                if (confirm('Отклонить товар? Это также удалит все его изображения.')) {
                                    const itemSnap = await get(ref(db, `items/${item.id}`));
                                    const itemData = itemSnap.val();
                                    if (itemData && itemData.images && itemData.images.length) {
                                        for (let i = 0; i < itemData.images.length; i++) {
                                            try {
                                                const imgRef = storageRef(storage, `items/${item.id}/${i}`);
                                                await deleteObject(imgRef);
                                            } catch (err) {}
                                        }
                                    }
                                    await remove(ref(db, `items/${item.id}`));
                                    const logRef = push(ref(db, 'logs'));
                                    await set(logRef, { action: 'reject', itemId: item.id, adminId: user.userId, timestamp: Date.now() });
                                }
                            });
                        });
                    }
                });

                const usersRef = ref(db, 'users');
                onValue(usersRef, (snapshot) => {
                    usersSpan.textContent = Object.keys(snapshot.val() || {}).length;
                });

                async function loadAllItems() {
                    const snap = await get(itemsRef);
                    const data = snap.val() || {};
                    const items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                    if (items.length === 0) {
                        allContainer.innerHTML = '<div class="no-items"><i class="fas fa-box-open"></i> Нет товаров</div>';
                        return;
                    }
                    let html = '';
                    items.forEach(item => {
                        const price = item.price.toLocaleString();
                        const desc = item.description || '';
                        const date = new Date(item.timestamp).toLocaleString();
                        const status = item.status === 'approved' ? ' Одобрено' : item.status === 'pending' ? ' Ожидает' : item.status;

                        let typeClass, typeIcon, typeLabel;
                        switch (item.type) {
                            case 'sale': typeClass = 'type-sale'; typeIcon = 'fa-tag'; typeLabel = 'Продажа'; break;
                            case 'buy': typeClass = 'type-buy'; typeIcon = 'fa-cart-shopping'; typeLabel = 'Покупка'; break;
                            case 'rent': typeClass = 'type-rent'; typeIcon = 'fa-hand-holding-dollar'; typeLabel = 'Аренда'; break;
                            case 'ad': typeClass = 'type-ad'; typeIcon = 'fa-bullhorn'; typeLabel = 'Реклама'; break;
                            default: typeClass = ''; typeIcon = 'fa-question'; typeLabel = item.type;
                        }

                        html += `
                            <div class="item-card" data-id="${item.id}">
                                <span class="item-type ${typeClass}"><i class="fas ${typeIcon}"></i> ${typeLabel}</span>
                                <h3 class="item-title">${escapeHtml(item.name)}</h3>
                                <div class="item-price"> ${price}</div>
                                <div class="item-description">${escapeHtml(desc)}</div>
                                <div class="item-footer">
                                    <span><i class="far fa-user"></i> ${item.userNick || 'Неизвестно'}</span>
                                    <span><i class="far fa-clock"></i> ${date}</span>
                                </div>
                                <div style="display: flex; gap: 10px; margin-top: 10px;">
                                    <span style="background:#6c757d; color:white; padding:4px 12px; border-radius:30px; font-size:0.8rem;">${status}</span>
                                    <button class="btn-primary" style="background:#dc3545; padding:4px 12px;" data-id="${item.id}" id="del-all-${item.id}"><i class="fas fa-trash"></i> Удалить</button>
                                </div>
                            </div>
                        `;
                    });
                    allContainer.innerHTML = html;
                    items.forEach(item => {
                        document.getElementById(`del-all-${item.id}`)?.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            if (confirm(`Удалить товар "${item.name}"? Это действие необратимо.`)) {
                                if (item.images && item.images.length) {
                                    for (let i = 0; i < item.images.length; i++) {
                                        try {
                                            const imgRef = storageRef(storage, `items/${item.id}/${i}`);
                                            await deleteObject(imgRef);
                                        } catch (err) {}
                                    }
                                }
                                await remove(ref(db, `items/${item.id}`));
                                const logRef = push(ref(db, 'logs'));
                                await set(logRef, { action: 'delete', itemId: item.id, adminId: user.userId, timestamp: Date.now() });
                            }
                        });
                    });
                }

                async function loadUsers() {
                    const snap = await get(usersRef);
                    const users = snap.val() || {};
                    let html = '<table style="width:100%; border-collapse:collapse;"><tr><th>Ник</th><th>Роль</th><th>Дата рег.</th></tr>';
                    for (let id in users) {
                        const u = users[id];
                        html += `<tr><td>${escapeHtml(u.nick)}</td><td>${u.role || 'user'}</td><td>${new Date(u.registered).toLocaleDateString()}</td></tr>`;
                    }
                    html += '</table>';
                    usersList.innerHTML = html;
                }

                async function loadLogs() {
                    const snap = await get(ref(db, 'logs'));
                    const logs = snap.val() || {};
                    const sorted = Object.entries(logs).sort((a,b) => b[1].timestamp - a[1].timestamp).slice(0,50);
                    let html = '';
                    for (let [id, log] of sorted) {
                        const date = new Date(log.timestamp).toLocaleString();
                        const action = log.action === 'approve' ? ' Одобрил' : (log.action === 'reject' ? ' Отклонил' : ' Удалил');
                        html += `<div class="log-item">${date} - ${action} товар ${log.itemId}</div>`;
                    }
                    logsList.innerHTML = html || '<div class="log-item">Нет записей</div>';
                }

                function escapeHtml(unsafe) {
                    return unsafe.replace(/[&<>"]/g, m => {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        if (m === '"') return '&quot;';
                        return m;
                    });
                }

                // Скрываем прелоадер
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 300);
                }

            } catch (error) {
                console.error('[Admin] Критическая ошибка:', error);
                alert('Произошла ошибка при загрузке админки. Смотрите консоль.');
            }
        })();
    </script>
</body>
</html>
