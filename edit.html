<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Редактирование | Arzmob Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #dee2e6;
            border-top-color: #6c757d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>

    <div class="container" style="display: flex; justify-content: center; flex-direction: column; align-items: center;">
        <div class="header" style="width: 100%;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="icon-btn" onclick="history.back()" title="Назад"><i class="fas fa-arrow-left"></i></button>
                <div class="logo"><i class="fas fa-store"></i> Arzmob</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="closeTelegramBtn" title="Закрыть" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="form-container">
            <h1><i class="fas fa-edit"></i> Редактировать</h1>
            <div class="subtitle">Измените данные объявления</div>

            <div class="form-group">
                <label>Название предмета</label>
                <input type="text" id="name">
            </div>

            <div class="form-group">
                <label>Цена</label>
                <input type="number" id="price" min="0">
            </div>

            <div class="form-group">
                <label>Категория</label>
                <select id="category">
                    <option value="accessories">Аксессуары</option>
                    <option value="resources">Ресурсы</option>
                    <option value="realty">Недвижимость</option>
                    <option value="transport">Транспорт</option>
                </select>
            </div>

            <div class="form-group">
                <label>Тип сделки</label>
                <select id="type">
                    <option value="sale">Продажа</option>
                    <option value="buy">Покупка</option>
                    <option value="rent">Аренда</option>
                    <option value="ad">Реклама</option>
                </select>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea id="desc" rows="4"></textarea>
            </div>

            <!-- Поле Telegram -->
            <div class="form-group">
                <label>Telegram для связи</label>
                <input type="text" id="telegram" placeholder="@username">
            </div>

            <div class="form-group">
                <label>Текущие изображения</label>
                <div id="currentImages" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
            </div>

            <div class="form-group">
                <label>Новые изображения (заменят старые, до 3 шт)</label>
                <input type="file" id="images" accept="image/*" multiple>
            </div>

            <button class="btn-primary" id="saveBtn"><i class="fas fa-save"></i> Сохранить</button>
        </div>

        <div class="watermark"><i class="fas fa-store"></i> Arzmob Store 2026</div>
    </div>

    <script>
        (function() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                const closeBtn = document.getElementById('closeTelegramBtn');
                if (closeBtn) {
                    closeBtn.style.display = 'inline-flex';
                    closeBtn.addEventListener('click', () => Telegram.WebApp.close());
                }
                Telegram.WebApp.setHeaderColor('#6c757d');
                Telegram.WebApp.setBackgroundColor('#e9ecef');
            }
            window.addEventListener('load', () => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => document.getElementById('preloader').style.display = 'none', 300);
            });
        })();
    </script>

    <script type="module">
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getCurrentUser } from './helpers.js';
        import { db, storage } from './firebase-config.js';

        const user = getCurrentUser();
        if (!user) window.location.href = 'login.html';

        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        if (!itemId) { alert('Товар не указан'); window.location.href = 'profile.html'; }

        const itemRef = ref(db, `items/${itemId}`);
        const itemSnap = await get(itemRef);
        const itemData = itemSnap.val();

        if (!itemData || itemData.userId !== user.userId) {
            alert('Нет доступа к редактированию');
            window.location.href = 'profile.html';
        }

        document.getElementById('name').value = itemData.name || '';
        document.getElementById('price').value = itemData.price || '';
        document.getElementById('category').value = itemData.category || 'accessories';
        document.getElementById('type').value = itemData.type || 'sale';
        document.getElementById('desc').value = itemData.description || '';
        document.getElementById('telegram').value = itemData.contact || '';

        // Текущие изображения
        const currentDiv = document.getElementById('currentImages');
        if (itemData.images && itemData.images.length) {
            itemData.images.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.style.width = '80px';
                img.style.height = '80px';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '8px';
                currentDiv.appendChild(img);
            });
        } else {
            currentDiv.textContent = 'Нет изображений';
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const price = document.getElementById('price').value.trim();
            const category = document.getElementById('category').value;
            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value.trim();
            const telegram = document.getElementById('telegram').value.trim().replace('@', '');
            const files = document.getElementById('images').files;

            if (!name || !price) {
                alert('Заполните название и цену');
                return;
            }

            let imageUrls = itemData.images || [];
            if (files.length > 0) {
                for (let i = 0; i < imageUrls.length; i++) {
                    try {
                        await deleteObject(storageRef(storage, `items/${itemId}/${i}`));
                    } catch (e) {}
                }
                imageUrls = [];
                for (let i = 0; i < Math.min(files.length, 3); i++) {
                    const file = files[i];
                    const imgRef = storageRef(storage, `items/${itemId}/${i}`);
                    await uploadBytes(imgRef, file);
                    imageUrls.push(await getDownloadURL(imgRef));
                }
            }

            await update(itemRef, {
                name,
                price: Number(price),
                category,
                type,
                description: desc,
                contact: telegram,
                images: imageUrls
            });

            alert('Изменения сохранены');
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
