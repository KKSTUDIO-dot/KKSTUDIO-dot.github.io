<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ArzMob - Товары</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <main id="main-content">
            <div class="categories-tabs">
                <button class="tab-btn active" data-cat="sale">Продажа</button>
                <button class="tab-btn" data-cat="buy">Покупка</button>
                <button class="tab-btn" data-cat="rent">Аренда</button>
                <button class="tab-btn" data-cat="ad">Реклама</button>
            </div>
            
            <!-- Кнопка добавления -->
            <button id="show-add-form" class="add-btn">+ Добавить объявление</button>
            
            <!-- Форма добавления (скрыта по умолчанию) -->
            <div id="add-form" class="add-form hidden">
                <h3>Новое объявление</h3>
                <select id="ad-category">
                    <option value="sale">Продажа</option>
                    <option value="buy">Покупка</option>
                    <option value="rent">Аренда</option>
                    <option value="ad">Реклама</option>
                </select>
                <input type="text" id="ad-title" placeholder="Название" required>
                <textarea id="ad-description" placeholder="Описание" rows="4" required></textarea>
                <input type="url" id="ad-image-url" placeholder="Ссылка на фото (необязательно)">
                <div class="form-buttons">
                    <button id="cancel-add" class="btn-secondary">Отмена</button>
                    <button id="submit-add" class="btn-primary">Отправить на модерацию</button>
                </div>
                <div id="add-status"></div>
            </div>
            
            <div class="goods-list"></div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            <a href="tovars.html" class="nav-item active">
                <i class="fas fa-store"></i>
                <span>Товары</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
        </nav>
    </div>

    <script type="module" src="tovars.js"></script>
</body>
</html>
