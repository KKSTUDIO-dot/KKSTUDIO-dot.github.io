<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ArzMob - Товары</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <main id="main-content">
            <div class="goods-list"></div>
        </main>

        <button id="add-ad-btn" class="fab">+</button>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" data-nav="home">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            <a href="tovars.html" class="nav-item active" data-nav="goods">
                <i class="fas fa-store"></i>
                <span>Товары</span>
            </a>
            <a href="profile.html" class="nav-item" data-nav="profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
        </nav>

        <!-- Модальное окно добавления объявления -->
        <div id="add-modal" class="modal">
            <textarea id="ad-text" placeholder="Описание товара..." rows="4"></textarea>
            <input type="file" id="ad-image" accept="image/*">
            <div class="modal-buttons">
                <button id="cancel-add">Отмена</button>
                <button id="submit-add">Опубликовать</button>
            </div>
        </div>
    </div>

    <script type="module" src="tovars.js"></script>
</body>
</html>
