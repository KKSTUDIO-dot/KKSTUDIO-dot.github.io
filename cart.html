<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>MotoBeast — Кошик</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/main.css">
    <style>
        .cart-page { margin: 40px 0; }
        .cart-title { font-size: 36px; font-weight: 900; margin-bottom: 30px; }
        .cart-container { display: flex; gap: 40px; flex-wrap: wrap; }
        .cart-items { flex: 2; min-width: 300px; }
        .cart-summary { flex: 1; min-width: 350px; background: #fff; border-radius: var(--border-radius); padding: 30px; box-shadow: var(--shadow-md); align-self: flex-start; }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow-sm);
            transition: 0.2s;
            flex-wrap: wrap;
        }
        .cart-item:hover { box-shadow: var(--shadow-md); }
        .cart-item-img {
            width: 100px;
            height: 100px;
            background: #f5f5f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #aaa;
            flex-shrink: 0;
            overflow: hidden;
        }
        .cart-item-img img { width: 100%; height: 100%; object-fit: contain; }
        .cart-item-info { flex: 1; min-width: 150px; }
        .cart-item-title { font-weight: 700; font-size: 18px; margin-bottom: 5px; }
        .cart-item-price { font-weight: 900; color: var(--mz-red); font-size: 20px; }
        .cart-item-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .qty-btn {
            width: 36px; height: 36px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .qty-btn:hover { background: #f0f0f0; }
        .qty-input {
            width: 60px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 10px;
            height: 36px;
            font-weight: 600;
        }
        .remove-btn {
            color: var(--mz-red);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            margin-left: 10px;
            transition: 0.2s;
        }
        .remove-btn:hover { transform: scale(1.1); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 18px; }
        .summary-total {
            font-size: 28px;
            font-weight: 900;
            color: var(--mz-red);
            border-top: 2px solid #eee;
            padding-top: 20px;
            margin-top: 20px;
        }
        .checkout-form { margin-top: 30px; }
        .checkout-form .form-group { margin-bottom: 20px; }
        .checkout-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        .checkout-form input,
        .checkout-form textarea,
        .checkout-form select {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #eee;
            border-radius: var(--input-radius);
            font-family: inherit;
            font-size: 16px;
            transition: 0.2s;
            background: #fafafa;
        }
        .checkout-form input:focus,
        .checkout-form textarea:focus,
        .checkout-form select:focus {
            border-color: var(--mz-red);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255,0,0,0.1);
        }
        .checkout-form input[readonly] {
            background: #f0f0f0;
            border-color: #ddd;
            color: #555;
        }
        .radio-group {
            display: flex;
            gap: 30px;
            align-items: center;
            margin: 10px 0 20px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
            cursor: pointer;
        }
        .radio-group input[type="radio"] { width: auto; margin: 0; }
        .nova-fields { display: none; margin-top: 15px; }
        .btn-primary {
            background: var(--mz-black);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 20px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: var(--shadow-sm);
            margin-top: 20px;
        }
        .btn-primary:hover {
            background: var(--mz-red);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .empty-cart {
            text-align: center;
            padding: 80px 20px;
            background: #fff;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            margin: 40px 0;
        }
        .empty-cart i {
            font-size: 80px;
            color: #ccc;
            margin-bottom: 20px;
        }
        .empty-cart h3 { font-size: 28px; margin-bottom: 10px; }
        .empty-cart a {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--mz-black);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            transition: 0.2s;
        }
        .empty-cart a:hover { background: var(--mz-red); }
        .recommended { margin-top: 60px; }
        .recommended h2 { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .recommended-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }
        .recommended-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .recommended-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--mz-red);
        }
        .recommended-img {
            height: 140px;
            background: #f5f5f5;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #aaa;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .recommended-img img { width: 100%; height: 100%; object-fit: contain; }
        .recommended-title { font-weight: 700; font-size: 16px; margin-bottom: 8px; }
        .recommended-price { font-weight: 900; color: var(--mz-red); font-size: 20px; }

        @media (max-width: 768px) {
            .cart-title { font-size: 28px; }
            .cart-item { flex-direction: column; align-items: flex-start; }
            .cart-item-actions { width: 100%; justify-content: flex-end; }
            .cart-summary { min-width: 100%; }
        }
        @media (max-width: 480px) {
            .cart-summary { padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="maintenance-screen">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <h1>MOTO<span>BEAST</span></h1>
        <p>Технічні роботи</p>
    </div>

    <header class="header">
        <div class="header-top">
            <div class="container header-flex">
                <a href="index.html" class="logo-group">
                    <div class="logo-icon"><i class="fa-solid fa-dragon"></i></div>
                    <div class="logo-text"><span class="m">MOTO</span><span class="b">BEAST</span></div>
                </a>
                <nav class="nav-menu">
                    <a href="#">Запчастини</a>
                    <a href="#">Екіпіровка</a>
                    <a href="#">Акції</a>
                    <a href="#">Контакти</a>
                </nav>
                <div class="user-actions">
                    <div id="auth-buttons">
                        <button class="auth-btn" onclick="showAuthModal()">Увійти</button>
                    </div>
                    <div id="user-info" style="display: none;" class="user-info">
                        <span id="user-name"></span>
                        <a href="profile.html" class="profile-btn"><i class="fa-solid fa-user"></i> Профіль</a>
                        <a onclick="logout()" class="logout-btn">Вийти</a>
                    </div>
                    <div class="cart-box" onclick="window.location.href='cart.html'">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="badge" id="cartBadge">0</span>
                    </div>
                </div>
                <div class="contacts-premium">
                    <span class="small-text" id="promo-text">Завантаження...</span>
                    <a href="tel:+380998183988" class="c-phone" id="site-phone">380998183988</a>
                    <span class="small-text">Пн-Пт 9:00–18:00</span>
                    <span class="moto-label">мотозилла мотозапчасти</span>
                </div>
            </div>
        </div>
    </header>

    <div class="nav-bar">
        <div class="container nav-flex">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Введіть назву запчастини або модель мотоцикла...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
    </div>

    <main class="container cart-page">
        <h1 class="cart-title">Кошик</h1>
        <div id="cart-content"></div>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAuthModal()">&times;</span>
            <h2 style="font-size: 28px; margin-bottom: 10px;">Вхід / Реєстрація</h2>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Вхід</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Реєстрація</button>
            </div>
            <div id="loginAuth" class="auth-tab-content active">
                <div class="form-group">
                    <label>Логін</label>
                    <input type="text" id="login-username" placeholder="Ваш логін">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="signIn()">Увійти</button>
            </div>
            <div id="registerAuth" class="auth-tab-content">
                <div class="form-group">
                    <label>Логін *</label>
                    <input type="text" id="reg-username" placeholder="Унікальний логін">
                </div>
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Ім'я</label>
                    <input type="text" id="reg-firstname" placeholder="Ім'я">
                </div>
                <div class="form-group">
                    <label>Прізвище</label>
                    <input type="text" id="reg-lastname" placeholder="Прізвище">
                </div>
                <button class="btn-primary" onclick="signUp()">Зареєструватися</button>
            </div>
            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, get, child, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        updateAuthUI();

        onValue(ref(db, 'settings'), (snap) => {
            const s = snap.val();
            if (s) {
                const maintenance = s.maintenance || false;
                if (maintenance && (!currentUser || currentUser.role !== 'admin')) {
                    document.getElementById('maintenance-screen').style.display = 'flex';
                } else {
                    document.getElementById('maintenance-screen').style.display = 'none';
                }
                document.getElementById('site-phone').innerText = s.phone || '380998183988';
                document.getElementById('promo-text').innerText = s.promoText || 'Кращі ціни на запчастини';
            }
        });

        function updateAuthUI() {
            if (currentUser) {
                document.getElementById('auth-buttons').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').textContent = ''; // ім'я не показуємо
            } else {
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-info').style.display = 'none';
            }
        }

        window.showAuthModal = () => {
            document.getElementById('authModal').style.display = 'flex';
        };
        window.closeAuthModal = () => {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('authMessage').innerText = '';
        };
        window.switchAuthTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('[onclick="switchAuthTab(\'login\')"]').classList.add('active');
                document.getElementById('loginAuth').classList.add('active');
            } else {
                document.querySelector('[onclick="switchAuthTab(\'register\')"]').classList.add('active');
                document.getElementById('registerAuth').classList.add('active');
            }
        };

        window.signUp = async () => {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const firstName = document.getElementById('reg-firstname').value.trim();
            const lastName = document.getElementById('reg-lastname').value.trim();

            if (!username || !password) {
                document.getElementById('authMessage').innerText = 'Логін і пароль обов\'язкові';
                return;
            }

            const snapshot = await get(child(ref(db), 'users/' + username));
            if (snapshot.exists()) {
                document.getElementById('authMessage').innerText = 'Користувач з таким логіном вже існує';
                return;
            }

            const userData = {
                username,
                password,
                firstName,
                lastName,
                role: 'user',
                createdAt: new Date().toISOString()
            };
            await set(ref(db, 'users/' + username), userData);
            currentUser = userData;
            localStorage.setItem('currentUser', JSON.stringify(userData));
            updateAuthUI();
            closeAuthModal();
        };

        window.signIn = async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) {
                document.getElementById('authMessage').innerText = 'Введіть логін і пароль';
                return;
            }

            const snapshot = await get(child(ref(db), 'users/' + username));
            if (!snapshot.exists()) {
                document.getElementById('authMessage').innerText = 'Невірний логін або пароль';
                return;
            }

            const userData = snapshot.val();
            if (userData.password !== password) {
                document.getElementById('authMessage').innerText = 'Невірний логін або пароль';
                return;
            }

            currentUser = userData;
            localStorage.setItem('currentUser', JSON.stringify(userData));
            updateAuthUI();
            closeAuthModal();
        };

        window.logout = () => {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateAuthUI();
        };

        let settings = {};
        onValue(ref(db, 'settings'), (snap) => {
            settings = snap.val() || {};
        });

        function getCart() {
            return JSON.parse(localStorage.getItem('motocart')) || [];
        }

        function saveCart(cart) {
            localStorage.setItem('motocart', JSON.stringify(cart));
            updateCartBadge();
            renderCart();
        }

        function updateCartBadge() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = totalItems;
        }

        let productsRef = {};
        onValue(ref(db, 'products'), (snap) => {
            productsRef = snap.val() || {};
            renderCart();
        });

        let allProducts = [];
        onValue(ref(db, 'products'), (snap) => {
            const data = snap.val();
            if (data) {
                allProducts = Object.keys(data).map(id => ({ id, ...data[id] }));
                renderRecommended();
            }
        });

        async function sendTelegramNotification(order, orderId) {
            if (!settings.telegramToken || !settings.telegramChat) return;
            const fullName = [order.customer.lastName, order.customer.firstName, order.customer.middleName].filter(Boolean).join(' ') || 'не вказано';
            let deliveryStr = '';
            if (order.delivery) {
                if (order.delivery.method === 'nova') {
                    deliveryStr = `Нова пошта: ${order.delivery.city || '?'}, відд. ${order.delivery.warehouse || '?'}`;
                } else {
                    deliveryStr = 'Самовивіз';
                }
            }
            const itemsList = order.items.map(item => `• ${item.name} — ${item.quantity} шт. × ${item.price} грн`).join('\n');
            const message = `
🛒 *Нове замовлення!* #${orderId.slice(-6)}
📅 *Дата:* ${new Date(order.createdAt).toLocaleString('uk-UA')}
👤 *Замовник:* ${fullName} (${order.userId || 'гість'})
📞 *Телефон:* ${order.customer.phone}
🚚 *Доставка:* ${deliveryStr}
${order.comment ? `💬 *Коментар:* ${order.comment}` : ''}
🛍 *Товари:*
${itemsList}
💰 *Загальна сума:* ${order.total} грн
            `;
            try {
                await fetch(`https://api.telegram.org/bot${settings.telegramToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: settings.telegramChat, text: message, parse_mode: 'Markdown' })
                });
            } catch (error) {
                console.error('Помилка відправки в Telegram:', error);
            }
        }

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-content');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <h3>Кошик порожній</h3>
                        <p>Додайте товари з каталогу</p>
                        <a href="index.html">Перейти до каталогу</a>
                    </div>
                `;
                renderRecommended();
                return;
            }

            let html = `<div class="cart-container">`;
            html += `<div class="cart-items">`;

            let total = 0;
            cart.forEach(item => {
                const product = productsRef[item.id] || {};
                const currentPrice = product.price || item.price;
                const subtotal = currentPrice * item.quantity;
                total += subtotal;

                const imageUrl = item.imageUrl || product.imageUrl;
                const iconClass = item.icon || product.icon || 'fa-box';
                const imageHtml = imageUrl ? 
                    `<img src="${imageUrl}" alt="${item.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fa-solid ${iconClass}\'></i>';">` : 
                    `<i class="fa-solid ${iconClass}"></i>`;

                html += `
                    <div class="cart-item" data-id="${item.id}">
                        <div class="cart-item-img">${imageHtml}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">${currentPrice} грн</div>
                        </div>
                        <div class="cart-item-actions">
                            <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
                            <input type="text" class="qty-input" value="${item.quantity}" readonly>
                            <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
                            <button class="remove-btn" onclick="removeItem('${item.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`; // cart-items

            html += `
                <div class="cart-summary">
                    <h2 style="margin-bottom: 20px;">Оформлення замовлення</h2>
                    <div class="summary-row">
                        <span>Товари (${cart.length})</span>
                        <span>${total} грн</span>
                    </div>
                    <div class="summary-total">
                        <span>Разом:</span>
                        <span>${total} грн</span>
                    </div>
                    
                    <form id="order-form" class="checkout-form">
                        <div class="form-group">
                            <label>Прізвище *</label>
                            <input type="text" id="customer-lastname" required ${currentUser ? `value="${currentUser.lastName || ''}" readonly` : ''}>
                        </div>
                        <div class="form-group">
                            <label>Ім'я *</label>
                            <input type="text" id="customer-firstname" required ${currentUser ? `value="${currentUser.firstName || ''}" readonly` : ''}>
                        </div>
                        <div class="form-group">
                            <label>По батькові (необов'язково)</label>
                            <input type="text" id="customer-middlename" ${currentUser ? 'readonly' : ''}>
                        </div>
                        <div class="form-group">
                            <label>Телефон *</label>
                            <input type="tel" id="customer-phone" required placeholder="+380991234567">
                        </div>
                        
                        <div class="form-group">
                            <label>Спосіб доставки</label>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="delivery-method" value="nova" checked onchange="toggleDeliveryFields()"> Нова пошта
                                </label>
                                <label>
                                    <input type="radio" name="delivery-method" value="pickup" onchange="toggleDeliveryFields()"> Самовивіз
                                </label>
                            </div>
                        </div>
                        
                        <div id="nova-fields" class="nova-fields">
                            <div class="form-group">
                                <label>Місто *</label>
                                <input type="text" id="delivery-city" placeholder="Наприклад, Київ">
                            </div>
                            <div class="form-group">
                                <label>Відділення Нової пошти *</label>
                                <input type="text" id="delivery-warehouse" placeholder="№ відділення або адреса">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Коментар до замовлення</label>
                            <textarea id="customer-comment" rows="3" placeholder="Додаткові побажання..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn-primary">Підтвердити замовлення</button>
                    </form>
                </div>
            `;
            html += `</div>`; // cart-container

            html += `<div class="recommended" id="recommended-block"></div>`;

            container.innerHTML = html;

            window.toggleDeliveryFields = () => {
                const method = document.querySelector('input[name="delivery-method"]:checked').value;
                const novaFields = document.getElementById('nova-fields');
                if (method === 'nova') {
                    novaFields.style.display = 'block';
                    document.getElementById('delivery-city').required = true;
                    document.getElementById('delivery-warehouse').required = true;
                } else {
                    novaFields.style.display = 'none';
                    document.getElementById('delivery-city').required = false;
                    document.getElementById('delivery-warehouse').required = false;
                }
            };
            toggleDeliveryFields();

            renderRecommended();
        }

        window.changeQty = (id, delta) => {
            const cart = getCart();
            const idx = cart.findIndex(i => i.id === id);
            if (idx !== -1) {
                const newQty = cart[idx].quantity + delta;
                if (newQty <= 0) {
                    cart.splice(idx, 1);
                } else {
                    cart[idx].quantity = newQty;
                }
                saveCart(cart);
            }
        };

        window.removeItem = (id) => {
            let cart = getCart();
            cart = cart.filter(i => i.id !== id);
            saveCart(cart);
        };

        function renderRecommended() {
            const cart = getCart();
            const cartIds = cart.map(item => item.id);
            const available = allProducts.filter(p => !cartIds.includes(p.id) && p.price && p.name);
            const shuffled = available.sort(() => 0.5 - Math.random());
            const recommended = shuffled.slice(0, 4);
            const container = document.getElementById('recommended-block');
            if (!container) return;
            if (recommended.length === 0) {
                container.innerHTML = '';
                return;
            }
            let html = `<h2>Рекомендуємо також</h2><div class="recommended-grid">`;
            recommended.forEach(p => {
                const imageHtml = p.imageUrl ? 
                    `<img src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fa-solid ${p.icon || 'fa-box'}\'></i>';">` : 
                    `<i class="fa-solid ${p.icon || 'fa-box'}"></i>`;
                html += `
                    <a href="product.html?id=${p.id}" class="recommended-card">
                        <div class="recommended-img">${imageHtml}</div>
                        <div class="recommended-title">${p.name}</div>
                        <div class="recommended-price">${p.price} грн</div>
                    </a>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        document.addEventListener('submit', async (e) => {
            if (e.target.id === 'order-form') {
                e.preventDefault();

                const firstName = document.getElementById('customer-firstname').value.trim();
                const lastName = document.getElementById('customer-lastname').value.trim();
                const middleName = document.getElementById('customer-middlename').value.trim();
                const phone = document.getElementById('customer-phone').value.trim();

                if (!firstName || !lastName || !phone) {
                    alert('Будь ласка, заповніть ім\'я, прізвище та телефон');
                    return;
                }

                const deliveryMethod = document.querySelector('input[name="delivery-method"]:checked').value;
                let delivery = { method: deliveryMethod };

                if (deliveryMethod === 'nova') {
                    const city = document.getElementById('delivery-city').value.trim();
                    const warehouse = document.getElementById('delivery-warehouse').value.trim();
                    if (!city || !warehouse) {
                        alert('Заповніть місто та відділення Нової пошти');
                        return;
                    }
                    delivery.city = city;
                    delivery.warehouse = warehouse;
                }

                const cart = getCart();
                if (cart.length === 0) {
                    alert('Кошик порожній');
                    return;
                }

                const items = cart.map(item => {
                    const product = productsRef[item.id] || {};
                    return {
                        id: item.id,
                        name: item.name,
                        quantity: item.quantity,
                        price: product.price || item.price
                    };
                });

                const total = items.reduce((sum, i) => sum + i.price * i.quantity, 0);

                const order = {
                    userId: currentUser ? currentUser.username : null,
                    customer: {
                        firstName: currentUser ? currentUser.firstName || firstName : firstName,
                        lastName: currentUser ? currentUser.lastName || lastName : lastName,
                        middleName,
                        phone
                    },
                    delivery,
                    items,
                    total,
                    comment: document.getElementById('customer-comment').value,
                    status: 'новий',
                    createdAt: new Date().toISOString()
                };

                try {
                    const orderRef = await push(ref(db, 'orders'), order);
                    await sendTelegramNotification(order, orderRef.key);
                    alert('Замовлення прийнято! Наш менеджер скоро зв’яжеться з вами.');
                    localStorage.removeItem('motocart');
                    updateCartBadge();
                    renderCart();
                } catch (error) {
                    alert('Помилка при оформленні замовлення. Спробуйте пізніше.');
                    console.error(error);
                }
            }
        });

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                window.location.href = 'index.html?search=' + encodeURIComponent(e.target.value);
            }
        });

        updateCartBadge();
        renderCart();
    </script>
</body>
</html>
