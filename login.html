<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Arzmob Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center;">
        <div class="form-container">
            <h1><i class="fas fa-sign-in-alt"></i> Вход</h1>
            <div class="subtitle">Введите ваш ник и пароль</div>
            <div class="form-group">
                <label>Никнейм</label>
                <input type="text" id="nick" placeholder="Ваш ник" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="pass" placeholder="••••••">
            </div>
            <button class="btn-primary" id="loginBtn"><i class="fas fa-arrow-right"></i> Войти</button>
            <div class="error" id="errorMsg"></div>
            <div class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
        </div>
    </div>

    <script type="module">
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { hashPassword } from './helpers.js';
        import { db } from './firebase-config.js';

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const nick = document.getElementById('nick').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const errorDiv = document.getElementById('errorMsg');

            if (!nick || !pass) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Введите ник и пароль';
                return;
            }

            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const users = snapshot.val() || {};

            let foundUser = null;
            for (let id in users) {
                if (users[id].nick === nick) {
                    foundUser = { id, ...users[id] };
                    break;
                }
            }

            if (!foundUser) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Пользователь не найден';
                return;
            }

            const hashed = await hashPassword(pass);
            if (hashed !== foundUser.password) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Неверный пароль';
                return;
            }

            localStorage.setItem('userId', foundUser.id);
            localStorage.setItem('userNick', foundUser.nick);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
