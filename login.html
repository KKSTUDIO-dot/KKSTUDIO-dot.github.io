<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход | Arzmob Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #dee2e6;
            border-top-color: #6c757d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Прелоадер -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <div class="container" style="display: flex; justify-content: center; flex-direction: column; align-items: center;">
        <!-- Шапка с кнопкой назад -->
        <div class="header" style="width: 100%;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="icon-btn" onclick="history.back()" title="Назад"><i class="fas fa-arrow-left"></i></button>
                <div class="logo"><i class="fas fa-store"></i> Arzmob</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="closeTelegramBtn" title="Закрыть" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <!-- Форма входа -->
        <div class="form-container">
            <h1><i class="fas fa-sign-in-alt"></i> Вход</h1>
            <div class="subtitle">Введите ваш ник и пароль</div>

            <div class="form-group">
                <label>Никнейм</label>
                <input type="text" id="nick" placeholder="Ваш ник" autocomplete="off">
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="pass" placeholder="••••••">
            </div>

            <button class="btn-primary" id="loginBtn"><i class="fas fa-arrow-right"></i> Войти</button>
            <div class="error" id="errorMsg"></div>
            <div class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
        </div>

        <!-- Водяной знак -->
        <div class="watermark">
            <i class="fas fa-store"></i> Arzmob Store 2026 — площадка для игроков Arizona Mobile
        </div>
    </div>

    <!-- Скрипт для Telegram, прелоадера и авто-авторизации -->
    <script>
        (function() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                const closeBtn = document.getElementById('closeTelegramBtn');
                if (closeBtn) {
                    closeBtn.style.display = 'inline-flex';
                    closeBtn.addEventListener('click', () => Telegram.WebApp.close());
                }
                Telegram.WebApp.setHeaderColor('#6c757d');
                Telegram.WebApp.setBackgroundColor('#e9ecef');
            }

            window.addEventListener('load', async function() {
                // Скрыть прелоадер
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 300);
                }

                // Если уже авторизован (в том числе через Telegram), редирект на главную
                if (localStorage.getItem('userId')) {
                    window.location.href = 'index.html';
                    return;
                }

                // Пробуем авторизоваться через Telegram
                try {
                    const { telegramAuth } = await import('./helpers.js');
                    const user = await telegramAuth();
                    if (user) {
                        window.location.href = 'index.html';
                    }
                } catch (e) {
                    console.warn('Telegram auth error', e);
                }
            });
        })();
    </script>

    <!-- Модуль входа (обычная авторизация) -->
    <script type="module">
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { hashPassword } from './helpers.js';
        import { db } from './firebase-config.js';

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const nick = document.getElementById('nick').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const errorDiv = document.getElementById('errorMsg');

            if (!nick || !pass) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Введите ник и пароль';
                return;
            }

            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const users = snapshot.val() || {};

            let foundUser = null;
            for (let id in users) {
                if (users[id].nick === nick) {
                    foundUser = { id, ...users[id] };
                    break;
                }
            }

            if (!foundUser) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Пользователь не найден';
                return;
            }

            const hashed = await hashPassword(pass);
            if (hashed !== foundUser.password) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Неверный пароль';
                return;
            }

            localStorage.setItem('userId', foundUser.id);
            localStorage.setItem('userNick', foundUser.nick);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
