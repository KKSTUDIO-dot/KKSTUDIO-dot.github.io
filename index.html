<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Studio Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --accent: #e91e63; --text: #ffffff; --dim: #71717a; --success: #4ade80; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 25px; border-radius: 28px; width: 100%; border: 1px solid rgba(255,255,255,0.05); }
        .auth-tabs { display: flex; margin-bottom: 20px; background: #000; border-radius: 12px; padding: 4px; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; color: var(--dim); cursor: pointer; border-radius: 10px; }
        .auth-tab.active { background: var(--accent); color: #fff; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; outline: none; }
        .remember { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 14px; color: var(--dim); }
        .primary-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; }

        #app { height: 100vh; display: none; flex-direction: column; }
        .page { display: none; padding: 40px 20px; flex-grow: 1; }
        .active-page { display: block; }
        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(20,20,23,0.9); backdrop-filter: blur(20px); border-radius: 24px; display: flex; padding: 6px; border: 1px solid rgba(255,255,255,0.05); }
        .nav-link { flex: 1; padding: 12px; text-align: center; color: var(--dim); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-link.active { color: var(--accent); }
        .admin-item { background: var(--card); padding: 12px; border-radius: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="setAuthMode('login')">ВХОД</div>
                <div class="auth-tab" id="tab-reg" onclick="setAuthMode('reg')">РЕГИСТРАЦИЯ</div>
            </div>
            <input type="text" id="nick-input" placeholder="Никнейм">
            <input type="password" id="pass-input" placeholder="Пароль">
            <label class="remember"><input type="checkbox" id="rem-check" checked> Запомнить меня</label>
            <button class="primary-btn" id="auth-btn" onclick="handleAuth()">ВХОД</button>
            <p id="msg" style="color:var(--accent); font-size:12px; text-align:center; margin-top:10px;"></p>
            <p id="debug-id" style="color:var(--dim); font-size:9px; text-align:center; margin-top:15px;"></p>
        </div>
    </div>

    <div id="app">
        <div id="p-home" class="page active-page"><h1 style="text-align:center;margin-top:50px;opacity:0.2">DS STUDIO</h1></div>
        <div id="p-profile" class="page">
            <h2 id="u-nick" style="margin-bottom:10px">User</h2>
            <div style="background:var(--card);padding:20px;border-radius:20px">
                <div style="font-size:12px;color:var(--dim)">БАЛАНС</div>
                <div style="font-size:32px;font-weight:900;color:var(--success)">$ <span id="u-bal">0</span></div>
            </div>
            <button class="primary-btn" style="margin-top:20px;background:#222" onclick="logout()">ВЫЙТИ</button>
        </div>
        <div id="p-admin" class="page"><h2>Админ</h2><div id="user-list"></div></div>
        <nav class="nav" id="menu">
            <div class="nav-link active" onclick="tab('p-home', this)">Главная</div>
            <div class="nav-link" onclick="tab('p-profile', this)">Профиль</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            authDomain: "ds-studio-app.firebaseapp.com",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.firebasestorage.app",
            messagingSenderId: "456035914456",
            appId: "1:456035914456:web:e2cdbc7e77563a9c7d7dad"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getDatabase(fApp);
        const tg = window.Telegram.WebApp;
        const MY_ID = "8169971367"; 
        let mode = 'login';

        window.setAuthMode = (m) => {
            mode = m;
            document.getElementById('tab-login').classList.toggle('active', m === 'login');
            document.getElementById('tab-reg').classList.toggle('active', m === 'reg');
            document.getElementById('auth-btn').innerText = m === 'login' ? 'ВХОД' : 'СОЗДАТЬ';
            document.getElementById('msg').innerText = "";
        };

        window.handleAuth = async () => {
            const nick = document.getElementById('nick-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const uid = String(tg.initDataUnsafe?.user?.id || "dev_test");
            if(!nick || !pass) return;

            const uRef = ref(db, 'users/' + uid);
            const snap = await get(uRef);

            if(mode === 'login') {
                if(snap.exists() && snap.val().password === pass) {
                    save(uid, pass); runApp(snap.val());
                } else { document.getElementById('msg').innerText = "Ошибка данных"; }
            } else {
                if(snap.exists()) { document.getElementById('msg').innerText = "Аккаунт уже есть"; }
                else {
                    const user = { id: uid, nickname: nick, password: pass, balance: 100 };
                    await set(uRef, user); save(uid, pass); runApp(user);
                }
            }
        };

        function save(uid, pass) {
            if(document.getElementById('rem-check').checked) {
                localStorage.setItem('ds_session', JSON.stringify({uid, pass}));
            }
        }

        window.logout = () => { localStorage.removeItem('ds_session'); location.reload(); };

        function runApp(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('u-nick').innerText = user.nickname;
            onValue(ref(db, 'users/' + user.id + '/balance'), s => document.getElementById('u-bal').innerText = s.val() || 0);

            if(String(user.id) === MY_ID) {
                if(!document.getElementById('adm-btn')) {
                    const btn = document.createElement('div'); btn.id="adm-btn"; btn.className='nav-link'; btn.innerText='Админ';
                    btn.onclick = function(){ tab('p-admin', this) }; document.getElementById('menu').appendChild(btn);
                    loadAdmin();
                }
            }
        }

        function loadAdmin() {
            onValue(ref(db, 'users'), snap => {
                const list = document.getElementById('user-list'); list.innerHTML = "";
                const data = snap.val();
                for(let k in data) {
                    const u = data[k];
                    const d = document.createElement('div'); d.className='admin-item';
                    d.innerHTML = `<span>${u.nickname}</span><input type="number" style="width:60px" value="${u.balance}">`;
                    d.querySelector('input').onchange = (e) => update(ref(db, 'users/'+u.id), {balance: parseInt(e.target.value)});
                    list.appendChild(d);
                }
            });
        }

        window.tab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active-page'); el.classList.add('active');
        };

        window.addEventListener('load', async () => {
            const uid = String(tg.initDataUnsafe?.user?.id || "dev_test");
            document.getElementById('debug-id').innerText = "Ваш Telegram ID: " + uid;
            
            const saved = localStorage.getItem('ds_session');
            if(saved) {
                try {
                    const {uid, pass} = JSON.parse(saved);
                    const snap = await get(ref(db, 'users/' + uid));
                    if(snap.exists() && snap.val().password === pass) runApp(snap.val());
                    else localStorage.removeItem('ds_session');
                } catch(e) { localStorage.removeItem('ds_session'); }
            }
        });
    </script>
</body>
</html>
