<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIZONA PORTAL | DS STUDIO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --arz-orange: #ff9800; 
            --arz-dark: #0f0f11;
            --arz-line: rgba(255, 152, 0, 0.3);
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Ubuntu', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* Фоновый эффект как в лаунчере */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 70% 20%, rgba(255, 152, 0, 0.08), transparent 40%);
            z-index: -1;
        }

        /* Загрузка */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--arz-orange); letter-spacing: 5px; }

        /* Экран авторизации в стиле диалога */
        #auth-screen { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.8); }
        .auth-box { 
            background: var(--arz-dark); width: 100%; max-width: 350px; 
            border-top: 4px solid var(--arz-orange); border-radius: 4px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center;
        }

        input { 
            width: 100%; padding: 14px; margin-bottom: 15px; background: #1a1a1e; 
            border: 1px solid #2a2a2e; color: #fff; outline: none; font-size: 14px;
        }
        input:focus { border-color: var(--arz-orange); }

        .btn-arz { 
            width: 100%; padding: 14px; border: none; font-weight: 900; cursor: pointer;
            background: linear-gradient(90deg, #ff9800, #e65100); color: #000;
            text-transform: uppercase; letter-spacing: 1px; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        /* Главный интерфейс (CEF Style) */
        #app { height: 100vh; display: none; flex-direction: column; }
        
        .header { 
            padding: 25px 20px; background: var(--arz-dark); 
            border-bottom: 2px solid var(--arz-orange);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .page { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .active-page { display: block; }

        /* Карточки статов */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .stat-card { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px;
            border-left: 3px solid var(--arz-orange); position: relative; overflow: hidden;
        }
        .stat-card::after { 
            content: ""; position: absolute; right: -10px; bottom: -10px; 
            font-size: 40px; opacity: 0.05; font-weight: 900;
        }

        .label { color: #888; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .val { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; }

        .money-box { 
            background: linear-gradient(135deg, #1b1b1f, #0f0f11); 
            padding: 25px; border-radius: 12px; margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Навигация как в лаунчере */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--arz-dark); display: flex; border-top: 1px solid #222;
        }
        .nav-item { 
            flex: 1; padding: 18px; text-align: center; color: #555; 
            font-size: 11px; font-weight: 900; text-transform: uppercase;
        }
        .nav-item.active { color: var(--arz-orange); border-top: 2px solid var(--arz-orange); background: rgba(255,152,0,0.02); }

    </style>
</head>
<body>

    <div id="loader">ARIZONA RP</div>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="margin-bottom: 5px; letter-spacing: 1px;">АВТОРИЗАЦИЯ</h2>
            <p style="font-size: 10px; color: #666; margin-bottom: 25px;">Введите данные вашего аккаунта</p>
            <input type="text" id="nick" placeholder="Введите Nick_Name">
            <input type="password" id="pass" placeholder="Введите пароль">
            <button class="btn-arz" onclick="handleAuth()">Войти в кабинет</button>
            <p id="err" style="color:#ff5252; font-size:11px; margin-top:15px; font-weight:700;"></p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span style="color:var(--arz-orange); font-size:10px; font-weight:900;">WELCOME BACK</span>
                    <h2 id="u-nick-disp" style="font-size:22px; letter-spacing:-0.5px;">Nick_Name</h2>
                </div>
                <div style="text-align:right;">
                    <div id="u-server" style="font-size:12px; font-weight:800; color:var(--arz-orange);">Saint Rose [06]</div>
                    <div style="font-size:9px; color:#666;">ID: <span id="u-id">284192</span></div>
                </div>
            </div>
        </div>

        <div id="p-profile" class="page active-page">
            
            <div class="money-box">
                <span class="label">Наличные средства</span>
                <div style="color:#4caf50; font-size:32px; font-weight:900;">$ <span id="u-bal-disp">0</span></div>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <span class="label">Игровой уровень</span>
                    <span class="val"><span id="u-lvl-disp">1</span> LVL</span>
                </div>
                <div class="stat-card" style="border-left-color: #00e5ff;">
                    <span class="label">Донат счет</span>
                    <span class="val" style="color:#00e5ff;"><span id="u-az-disp">0</span> AZ</span>
                </div>
                <div class="stat-card">
                    <span class="label">Организация</span>
                    <span class="val" id="u-org-disp">Нет</span>
                </div>
                <div class="stat-card">
                    <span class="label">VIP Статус</span>
                    <span class="val" style="color:var(--arz-orange);" id="u-vip-disp">Нет</span>
                </div>
            </div>

            <button onclick="logout()" style="margin-top:30px; background:none; border:none; color:#444; font-size:10px; font-weight:900; letter-spacing:1px; width:100%;">ЗАВЕРШИТЬ СЕАНС</button>
        </div>

        <div id="p-admin" class="page">
            <h2 style="color:var(--arz-orange); margin-bottom:15px;">ADMIN PANEL</h2>
            <div id="admin-list"></div>
        </div>

        <nav class="nav" id="menu">
            <div class="nav-item active" onclick="tab('p-profile', this)">Кабинет</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            authDomain: "ds-studio-app.firebaseapp.com",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.firebasestorage.app",
            messagingSenderId: "456035914456",
            appId: "1:456035914456:web:e2cdbc7e77563a9c7d7dad"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getDatabase(fApp);
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function init() {
            const sn = localStorage.getItem('ds_nick'), sp = localStorage.getItem('ds_pass');
            if (sn && sp) {
                const s = await get(ref(db, 'users/' + sn));
                if (s.exists() && s.val().password === sp) runApp(s.val());
                else showAuth();
            } else showAuth();
            document.getElementById('loader').style.display = 'none';
        }

        function showAuth() { document.getElementById('auth-screen').style.display = 'flex'; }

        window.handleAuth = async () => {
            const n = document.getElementById('nick').value.trim(), p = document.getElementById('pass').value.trim();
            if(!n || !p) return;
            const r = ref(db, 'users/' + n), s = await get(r);
            if(s.exists()) {
                if(s.val().password === p) { localStorage.setItem('ds_nick', n); localStorage.setItem('ds_pass', p); runApp(s.val()); }
                else document.getElementById('err').innerText = "ОШИБКА: ПАРОЛЬ НЕВЕРЕН";
            } else {
                const d = { nickname: n, password: p, balance: 0, level: 1, az: 0, org: "Нет", vip: "Нет", adminLvl: (n.toLowerCase() === 'derrick' ? 5 : 0) };
                await set(r, d); localStorage.setItem('ds_nick', n); localStorage.setItem('ds_pass', p); runApp(d);
            }
        };

        function runApp(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            onValue(ref(db, 'users/' + user.nickname), s => {
                const d = s.val(); if(!d) return;
                document.getElementById('u-nick-disp').innerText = d.nickname;
                document.getElementById('u-bal-disp').innerText = (d.balance || 0).toLocaleString();
                document.getElementById('u-lvl-disp').innerText = d.level || 1;
                document.getElementById('u-az-disp').innerText = (d.az || 0).toLocaleString();
                document.getElementById('u-org-disp').innerText = d.org || "Нет";
                document.getElementById('u-vip-disp').innerText = d.vip || "Нет";
            });

            if (user.adminLvl > 0) {
                const b = document.createElement('div'); b.className = 'nav-item'; b.innerText = 'АДМИН';
                b.onclick = function() { tab('p-admin', this) }; document.getElementById('menu').appendChild(b);
                onValue(ref(db, 'users'), s => renderAdmin(s.val()));
            }
        }

        function renderAdmin(users) {
            const l = document.getElementById('admin-list'); l.innerHTML = "";
            for(let n in users) {
                const u = users[n];
                const c = document.createElement('div');
                c.className = 'stat-card'; c.style.marginBottom = "10px";
                c.innerHTML = `
                    <b style="color:var(--arz-orange)">${u.nickname}</b><br><br>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                        <input type="number" value="${u.balance}" onchange="upd('${n}','balance',this.value)" placeholder="Баланс">
                        <input type="number" value="${u.level}" onchange="upd('${n}','level',this.value)" placeholder="LVL">
                        <input type="number" value="${u.az}" onchange="upd('${n}','az',this.value)" placeholder="AZ">
                        <input type="text" value="${u.org}" onchange="upd('${n}','org',this.value)" placeholder="Орг">
                    </div>
                `;
                l.appendChild(c);
            }
        }

        window.upd = (n, k, v) => {
            const data = {}; data[k] = (k === 'org' || k === 'vip') ? v : parseInt(v);
            update(ref(db, 'users/' + n), data);
        };

        window.logout = () => { localStorage.clear(); location.reload(); };
        window.tab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
            el.classList.add('active'); document.getElementById(id).classList.add('active-page');
            tg.HapticFeedback.impactOccurred('medium');
        };

        init();
    </script>
</body>
</html>
