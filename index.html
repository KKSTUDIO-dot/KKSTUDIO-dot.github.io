<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Studio OS Messages</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050505; --card: #111113; --accent: #e91e63; --text: #ffffff; --dim: #71717a; --success: #4ade80; --danger: #ff4b2b; --gold: #facc15; --info: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth UI */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        input, textarea { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: #000; color: #fff; outline: none; font-size: 14px; }
        .primary-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; }
        
        #app { height: 100vh; display: none; flex-direction: column; }
        .page { display: none; padding: 25px 20px; flex-grow: 1; overflow-y: auto; padding-bottom: 110px; }
        .active-page { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .notif-btn { position: relative; width: 48px; height: 48px; background: var(--card); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .notif-dot { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; background: var(--danger); border-radius: 50%; border: 2px solid var(--card); display: none; }

        /* Message UI */
        .msg-box { background: var(--card); padding: 18px; border-radius: 22px; margin-bottom: 12px; border-left: 4px solid var(--info); animation: slideIn 0.3s ease; }
        .msg-time { font-size: 10px; color: var(--dim); font-weight: 700; display: block; margin-bottom: 6px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* Admin Tools */
        .user-card { background: #18181b; padding: 18px; border-radius: 24px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .send-row { display: flex; gap: 8px; margin-top: 10px; }
        .send-input { margin-bottom: 0; flex-grow: 1; background: #000; border: 1px solid #222; padding: 12px; height: 45px; border-radius: 12px; }
        .send-btn { background: var(--info); border: none; color: #fff; padding: 0 15px; border-radius: 12px; font-weight: 800; font-size: 12px; cursor: pointer; }

        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(17,17,19,0.9); backdrop-filter: blur(20px); border-radius: 28px; display: flex; padding: 8px; border: 1px solid rgba(255,255,255,0.08); z-index: 1000; }
        .nav-link { flex: 1; padding: 14px; text-align: center; color: var(--dim); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-link.active { color: var(--accent); }
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 8px; font-weight: 900; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="margin-bottom:20px;">DS STUDIO</h1>
            <div style="display:flex; background:#000; padding:4px; border-radius:14px; margin-bottom:20px">
                <div id="t-login" style="flex:1; padding:12px; cursor:pointer; border-radius:10px; font-weight:800; font-size:12px;" onclick="setMode('login')">ВХОД</div>
                <div id="t-reg" style="flex:1; padding:12px; cursor:pointer; border-radius:10px; font-weight:800; font-size:12px;" onclick="setMode('reg')">РЕГИСТРАЦИЯ</div>
            </div>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="primary-btn" onclick="handleAuth()">ПРОДОЛЖИТЬ</button>
            <p id="err" style="color:var(--accent); font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="app">
        <div id="p-home" class="page active-page">
            <div style="margin-top:120px; text-align:center; opacity:0.1"><h1>DS STUDIO</h1></div>
        </div>

        <div id="p-profile" class="page">
            <div class="top-bar">
                <div>
                    <h2 id="u-nick-disp" style="font-size:28px;">User</h2>
                    <div id="u-role-disp" style="margin-top:5px"></div>
                </div>
                <div class="notif-btn" onclick="tab('p-messages')">
                    🔔 <div id="notif-dot" class="notif-dot"></div>
                </div>
            </div>
            <div style="background:var(--card); padding:25px; border-radius:28px; border:1px solid rgba(255,255,255,0.03)">
                <span style="color:var(--dim); font-size:11px; font-weight:800;">БАЛАНС</span>
                <h1 style="color:var(--success); font-size:40px; margin-top:5px; font-weight:900;">$ <span id="u-bal-disp">0</span></h1>
            </div>
            <button class="primary-btn" style="margin-top:30px; background:#1a1a1c; color:var(--danger)" onclick="location.reload()">ВЫЙТИ</button>
        </div>

        <div id="p-messages" class="page">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
                <button onclick="tab('p-profile')" style="background:none; border:none; color:var(--accent); font-size:24px;">←</button>
                <h2>Уведомления</h2>
            </div>
            <div id="messages-list">
                <p style="color:var(--dim); text-align:center; margin-top:50px;">У вас пока нет сообщений</p>
            </div>
        </div>

        <div id="p-admin" class="page">
            <h2 style="margin-bottom:20px;">Админ-центр</h2>
            <input type="text" id="a-search" placeholder="Поиск ника..." oninput="renderAdminList()">
            <div id="admin-list"></div>
        </div>

        <nav class="nav" id="menu">
            <div class="nav-link active" onclick="tab('p-home', this)">Главная</div>
            <div class="nav-link" onclick="tab('p-profile', this)">Профиль</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            authDomain: "ds-studio-app.firebaseapp.com",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.firebasestorage.app",
            messagingSenderId: "456035914456",
            appId: "1:456035914456:web:e2cdbc7e77563a9c7d7dad"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getDatabase(fApp);
        const tg = window.Telegram.WebApp;
        
        let mode = 'login';
        let me = null;
        let allUsers = {};

        window.setMode = (m) => {
            mode = m;
            document.getElementById('t-login').style.background = m === 'login' ? '#e91e63' : 'transparent';
            document.getElementById('t-reg').style.background = m === 'reg' ? '#e91e63' : 'transparent';
        };
        setMode('login');

        window.handleAuth = async () => {
            const nick = document.getElementById('nick').value.trim();
            const pass = document.getElementById('pass').value.trim();
            if(!nick || !pass) return;
            const uRef = ref(db, 'users/' + nick);
            const snap = await get(uRef);

            if(mode === 'login') {
                if(snap.exists() && snap.val().password === pass) runApp(snap.val());
                else document.getElementById('err').innerText = "Ошибка входа";
            } else {
                if(snap.exists()) document.getElementById('err').innerText = "Ник занят";
                else {
                    const data = { nickname: nick, password: pass, balance: 100, adminLvl: 0 };
                    if(nick.toLowerCase() === 'derrick') data.adminLvl = 5;
                    await set(uRef, data);
                    runApp(data);
                }
            }
        };

        function runApp(user) {
            me = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('u-nick-disp').innerText = user.nickname;
            
            // Следим за данными профиля
            onValue(ref(db, 'users/' + user.nickname), s => {
                const d = s.val() || {};
                document.getElementById('u-bal-disp').innerText = d.balance || 0;
                let roleTag = d.adminLvl > 0 ? `<span class="badge" style="background:var(--gold); color:#000;">LVL ${d.adminLvl}</span>` : '';
                if(d.adminLvl === 5) roleTag = `<span class="badge" style="background:var(--accent); color:#fff;">OWNER</span>`;
                document.getElementById('u-role-disp').innerHTML = roleTag;
            });

            // Следим за сообщениями
            onValue(ref(db, 'messages/' + user.nickname), snap => {
                const list = document.getElementById('messages-list');
                const dot = document.getElementById('notif-dot');
                list.innerHTML = "";
                const msgs = snap.val();
                
                if(msgs) {
                    dot.style.display = 'block';
                    Object.values(msgs).reverse().forEach(m => {
                        const box = document.createElement('div');
                        box.className = 'msg-box';
                        box.innerHTML = `<span class="msg-time">${new Date(m.date).toLocaleString()}</span><p>${m.text}</p>`;
                        list.appendChild(box);
                    });
                } else {
                    dot.style.display = 'none';
                    list.innerHTML = `<p style="color:var(--dim); text-align:center; margin-top:50px;">Сообщений нет</p>`;
                }
            });

            if(user.adminLvl > 0) {
                if(!document.getElementById('adm-btn-nav')) {
                    const btn = document.createElement('div');
                    btn.id = 'adm-btn-nav'; btn.className = 'nav-link'; btn.innerText = 'Админ';
                    btn.onclick = function() { tab('p-admin', this) };
                    document.getElementById('menu').appendChild(btn);
                    loadAdminData();
                }
            }
        }

        window.sendAdminMsg = async (targetNick) => {
            const input = document.getElementById('msg-input-' + targetNick);
            const text = input.value.trim();
            if(!text) return;

            const msgRef = ref(db, 'messages/' + targetNick);
            await push(msgRef, {
                text: text,
                date: Date.now(),
                sender: me.nickname
            });

            input.value = ""; // Очистка
            input.blur();    // Скрытие клавиатуры
            tg.HapticFeedback.notificationOccurred('success');
        };

        function loadAdminData() {
            onValue(ref(db, 'users'), snap => {
                allUsers = snap.val() || {};
                renderAdminList();
            });
        }

        window.renderAdminList = () => {
            const list = document.getElementById('admin-list');
            const search = document.getElementById('a-search').value.toLowerCase();
            list.innerHTML = "";
            
            for(let nick in allUsers) {
                const u = allUsers[nick];
                if(!nick.toLowerCase().includes(search)) continue;
                const isTargetOwner = u.adminLvl === 5;
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <b>${u.nickname} ${u.adminLvl > 0 ? '<span class="badge" style="background:var(--gold); color:#000;">Lvl '+u.adminLvl+'</span>' : ''}</b>
                        <span style="color:var(--success); font-weight:800">$${u.balance}</span>
                    </div>
                    
                    <div class="send-row">
                        <input type="text" id="msg-input-${nick}" class="send-input" placeholder="Написать сообщение...">
                        <button class="send-btn" onclick="sendAdminMsg('${nick}')">ОТПРАВИТЬ</button>
                    </div>

                    <div style="display:flex; gap:10px; margin-top:15px; align-items:center;">
                        ${!isTargetOwner ? `
                            <input type="number" style="width:70px; margin-bottom:0; padding:8px; height:35px;" value="${u.balance}" onchange="changeBal('${nick}', this.value)">
                            <button onclick="delUser('${nick}')" style="background:none; border:none; color:var(--danger); font-size:10px; font-weight:800; margin-left:auto;">УДАЛИТЬ</button>
                        ` : '<span style="color:var(--dim); font-size:10px;">OWNER PROTECTED</span>'}
                    </div>
                `;
                list.appendChild(card);
            }
        };

        window.changeBal = (n, v) => update(ref(db, 'users/'+n), {balance: parseInt(v) || 0});
        window.delUser = (n) => { if(confirm('Удалить?')) { remove(ref(db, 'users/'+n)); remove(ref(db, 'messages/'+n)); }};

        window.tab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(el) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                el.classList.add('active');
            }
            document.getElementById(id).classList.add('active-page');
            tg.HapticFeedback.impactOccurred('light');
        };
    </script>
</body>
</html>
