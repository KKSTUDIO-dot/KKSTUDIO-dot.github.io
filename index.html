<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Studio | OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="home-wrapper" id="homeWrap">
            <div class="main-logo">
                <div class="letters"><span class="letter">D</span><span class="letter">S</span></div>
                <div class="sub-logo">STUDIO</div>
            </div>

            <div class="home-content">
                <div class="category-grid">
                    <div class="cat-btn glass" onclick="openPage('scripts')">
                        <span class="icon">🤖</span>
                        <span class="name">SCRIPTS MOBILE</span>
                    </div>
                    <div class="cat-btn glass" onclick="openPage('design')">
                        <span class="icon">🎨</span>
                        <span class="name">PREMIUM DESIGN</span>
                    </div>
                    <div class="cat-btn glass" onclick="openPage('info')">
                        <span class="icon">✨</span>
                        <span class="name">ИНФОРМАЦИЯ</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="scripts" class="overlay glass-heavy">
        <div class="overlay-header">
            <button class="back-btn" onclick="closePage('scripts')">←</button>
            <span class="title">ARIZONA MOBILE</span>
        </div>
        <div class="overlay-body">
            <div class="card glass">
                <b class="accent-txt">Farm Bot</b>
                <p>Автоматизация работы на частных фермах. Умный обход препятствий.</p>
            </div>
            <div class="card glass">
                <b class="accent-txt">Helper Org</b>
                <p>Универсальный помощник для гос. структур и гетто.</p>
            </div>
        </div>
    </div>

    <div id="design" class="overlay glass-heavy">
        <div class="overlay-header">
            <button class="back-btn" onclick="closePage('design')">←</button>
            <span class="title">DESIGN</span>
        </div>
        <div class="overlay-body">
            <div class="card glass">
                <b class="accent-txt">Форумная графика</b>
                <p>Анимированные аватарки, подписи и баннеры тем.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
