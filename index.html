<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arizona Mobile | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --arizona-orange: #ff8c00;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --green: #2ecc71;
            --text-gray: #888;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--arizona-orange);
            margin-bottom: 20px;
            width: 100%;
        }

        .login-card, .profile-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--arizona-orange);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Виджет профиля */
        .profile-card { display: none; text-align: center; }

        .skin-img {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(255,140,0,0.3));
        }

        .stats-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            margin-top: 20px;
        }

        .stat-box {
            background: #222;
            padding: 12px;
            border-radius: 10px;
            border-left: 3px solid var(--arizona-orange);
        }

        .stat-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; }
        .stat-value { display: block; font-weight: 700; margin-top: 5px; }
        .money { color: var(--green); }

        .loader { display: none; color: var(--arizona-orange); margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: 700;">ARIZONA <span style="color:var(--arizona-orange)">MOBILE</span></div>
</header>

<div class="app-container">
    <div class="login-card" id="login-screen">
        <h3 style="margin-top:0">Вход в кабинет</h3>
        <input type="text" id="nick" placeholder="Nick_Name" value="">
        <select id="server">
            <option value="1">Phoenix</option>
            <option value="2">Tucson</option>
            <option value="10">Surprise</option>
            <option value="20">Sun-City</option>
            <option value="30">Love</option>
        </select>
        <button onclick="loadPlayerData()">Загрузить данные</button>
        <center><div id="loading" class="loader">Синхронизация с API...</div></center>
    </div>

    <div class="profile-card" id="profile-screen">
        <img id="ui-skin" src="https://arizona-rp.com/assets/img/skins/1.png" class="skin-img">
        <h2 id="ui-nick" style="margin: 5px 0;">Nick_Name</h2>
        <span id="ui-server-name" style="color: var(--text-gray); font-size: 14px;">Server</span>
        
        <div class="stats-list">
            <div class="stat-box">
                <span class="stat-label">Уровень</span>
                <span id="ui-level" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Наличные</span>
                <span id="ui-cash" class="stat-value money">$ 0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Организация</span>
                <span id="ui-org" class="stat-value">Нет</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Банк</span>
                <span id="ui-bank" class="stat-value">$ 0</span>
            </div>
        </div>
        
        <button style="background:#333; margin-top: 30px;" onclick="location.reload()">Выйти</button>
    </div>
</div>

<script>
    const API_KEY = 'BIj8OHrAlrhghiYkIjsWfRmNEJ8Ysth5';

    async function loadPlayerData() {
        const nick = document.getElementById('nick').value.trim();
        const serverId = document.getElementById('server').value;
        const loader = document.getElementById('loading');
        
        if (!nick) return alert("Введите ник!");

        loader.style.display = 'block';

        // URL API (замени на реальный эндпоинт, если он отличается)
        const apiUrl = `https://arizona-rp.com/api/v1/profile?server=${serverId}&nick=${nick}`;
        
        // Настройка заголовков для передачи ключа
        const myHeaders = new Headers();
        myHeaders.append("X-API-Key", API_KEY);

        const requestOptions = {
            method: 'GET',
            headers: myHeaders,
            redirect: 'follow'
        };

        try {
            // Используем прокси AllOrigins, чтобы избежать ошибки CORS на GitHub Pages
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
            
            const response = await fetch(proxyUrl);
            const wrapper = await response.json();
            
            // Парсим содержимое, которое прислал прокси
            const data = JSON.parse(wrapper.contents);

            if (data && data.success) {
                const player = data.data;

                // Заполняем UI
                document.getElementById('ui-nick').innerText = player.username || nick;
                document.getElementById('ui-level').innerText = player.level || "0";
                document.getElementById('ui-cash').innerText = `$ ${new Intl.NumberFormat().format(player.money || 0)}`;
                document.getElementById('ui-bank').innerText = `$ ${new Intl.NumberFormat().format(player.bank || 0)}`;
                document.getElementById('ui-org').innerText = player.organization || "Нет";
                
                // Подгружаем скин (если API отдает skin_id)
                if (player.skin_id) {
                    document.getElementById('ui-skin').src = `https://arizona-rp.com/assets/img/skins/${player.skin_id}.png`;
                }

                // Переключаем экраны
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('profile-screen').style.display = 'block';
            } else {
                alert("Ошибка: " + (data.message || "Игрок не найден"));
            }
        } catch (error) {
            console.error(error);
            alert("Не удалось подключиться к API. Проверьте ключ или соединение.");
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
