<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Studio OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #141417;
            --accent: #e91e63;
            --text: #ffffff;
            --dim: #71717a;
            --success: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 25px; border-radius: 28px; width: 100%; border: 1px solid rgba(255,255,255,0.05); }
        
        .auth-tabs { display: flex; margin-bottom: 20px; background: #000; border-radius: 12px; padding: 4px; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; color: var(--dim); cursor: pointer; border-radius: 10px; }
        .auth-tab.active { background: var(--accent); color: #fff; }

        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: #fff; font-size: 16px; outline: none; }
        .primary-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; }
        
        /* App Layout */
        #app { height: 100vh; display: none; flex-direction: column; }
        .page { display: none; padding: 40px 20px; flex-grow: 1; overflow-y: auto; }
        .active-page { display: block; }

        /* UI Elements */
        .profile-header { background: var(--card); padding: 20px; border-radius: 24px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar { width: 55px; height: 55px; background: linear-gradient(135deg, var(--accent), #880e4f); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }
        .balance-card { background: var(--card); padding: 25px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        
        .admin-item { background: var(--card); padding: 12px; border-radius: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .admin-input { width: 70px; background: #000; border: 1px solid #333; color: var(--success); padding: 6px; border-radius: 8px; text-align: center; }

        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(20,20,23,0.9); backdrop-filter: blur(20px); border-radius: 24px; display: flex; padding: 6px; border: 1px solid rgba(255,255,255,0.05); }
        .nav-link { flex: 1; padding: 12px; text-align: center; color: var(--dim); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="setAuthMode('login')">ВХОД</div>
                <div class="auth-tab" id="tab-reg" onclick="setAuthMode('reg')">РЕГИСТРАЦИЯ</div>
            </div>
            <input type="text" id="nick-input" placeholder="Никнейм">
            <input type="password" id="pass-input" placeholder="Пароль">
            <button class="primary-btn" id="auth-btn" onclick="handleAuth()">ВОЙТИ</button>
            <p id="auth-msg" style="color:var(--accent); font-size:12px; text-align:center; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="app">
        <div id="p-home" class="page active-page">
            <h1 style="text-align:center; margin-top:50px; opacity:0.2;">DS STUDIO</h1>
        </div>
        <div id="p-profile" class="page">
            <div class="profile-header">
                <div class="avatar" id="u-ava">?</div>
                <div>
                    <div style="font-size:18px; font-weight:700;" id="u-nick">User</div>
                    <div style="font-size:10px; color:var(--accent); font-weight:900;">ID: <span id="u-id">0</span></div>
                </div>
            </div>
            <div class="balance-card">
                <div style="font-size:11px; color:var(--dim);">БАЛАНС</div>
                <div style="font-size:36px; font-weight:900; color:var(--success);">$ <span id="u-bal">0</span></div>
            </div>
        </div>
        <div id="p-admin" class="page">
            <h2 style="margin-bottom:20px;">Админ-панель</h2>
            <div id="user-list"></div>
        </div>
        <nav class="nav" id="menu">
            <div class="nav-link active" onclick="tab('p-home', this)">Главная</div>
            <div class="nav-link" onclick="tab('p-profile', this)">Профиль</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            authDomain: "ds-studio-app.firebaseapp.com",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.firebasestorage.app",
            messagingSenderId: "456035914456",
            appId: "1:456035914456:web:e2cdbc7e77563a9c7d7dad"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getDatabase(fApp);
        const tg = window.Telegram.WebApp;
        tg.ready();

        const MY_ID = "8169971367"; 
        let authMode = 'login';

        window.setAuthMode = (mode) => {
            authMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-reg').classList.toggle('active', mode === 'reg');
            document.getElementById('auth-btn').innerText = mode === 'login' ? 'ВОЙТИ' : 'СОЗДАТЬ АККАУНТ';
            document.getElementById('auth-msg').style.display = 'none';
        };

        window.handleAuth = async () => {
            const nick = document.getElementById('nick-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const uid = String(tg.initDataUnsafe?.user?.id || "dev_user");
            const msg = document.getElementById('auth-msg');

            if (!nick || !pass) return;

            const uRef = ref(db, 'users/' + uid);
            const snap = await get(uRef);

            if (authMode === 'login') {
                if (snap.exists() && snap.val().password === pass) {
                    runApp(snap.val());
                } else {
                    msg.innerText = "Ошибка входа: проверьте данные";
                    msg.style.display = 'block';
                }
            } else {
                if (snap.exists()) {
                    msg.innerText = "Аккаунт уже существует! Просто войдите.";
                    msg.style.display = 'block';
                } else {
                    const newUser = { id: uid, nickname: nick, password: pass, balance: 100 };
                    await set(uRef, newUser);
                    runApp(newUser);
                }
            }
        };

        function runApp(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('u-nick').innerText = user.nickname;
            document.getElementById('u-id').innerText = user.id;
            document.getElementById('u-ava').innerText = user.nickname[0].toUpperCase();

            onValue(ref(db, 'users/' + user.id + '/balance'), (s) => {
                document.getElementById('u-bal').innerText = s.val() || 0;
            });

            if (String(user.id) === MY_ID) {
                const m = document.getElementById('menu');
                const adminBtn = document.createElement('div');
                adminBtn.className = 'nav-link';
                adminBtn.innerText = 'Админ';
                adminBtn.onclick = function() { tab('p-admin', this); };
                m.appendChild(adminBtn);
                loadAdmin();
            }
        }

        function loadAdmin() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                const data = snap.val();
                for (let key in data) {
                    const u = data[key];
                    const div = document.createElement('div');
                    div.className = 'admin-item';
                    div.innerHTML = `<span>${u.nickname}</span> <input type="number" class="admin-input" value="${u.balance}">`;
                    div.querySelector('input').onchange = (e) => {
                        update(ref(db, 'users/' + u.id), { balance: parseInt(e.target.value) });
                    };
                    list.appendChild(div);
                }
            });
        }

        window.tab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        };
    </script>
</body>
</html>
