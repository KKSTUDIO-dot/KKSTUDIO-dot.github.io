<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iOS 26 Stats</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1c1c1e; border-radius: 30px; padding: 25px; width: 260px; text-align: center; }
        .money { font-size: 40px; font-weight: 800; margin: 10px 0; }
        .label { color: #8e8e93; font-size: 12px; text-transform: uppercase; }
        .btn { margin-top: 20px; padding: 15px 30px; background: #0a84ff; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">Наличные</div>
        <div id="money" class="money">$0</div>
        <div id="info" style="color: #8e8e93; font-size: 14px;">Загрузка...</div>
        <button class="btn" onclick="loadData()">Обновить</button>
    </div>

    <script>
        // Твоя ссылка из Google
        const URL = "https://script.google.com/macros/s/AKfycbz1e9WPTLnKu2zQFledPKNae2KybiIjfi8VR_Oo9YkOwarUiQBzpHWFzKAkdo_8RiTN/exec";

        async function loadData() {
            try {
                // Добавляем параметр для обхода кэша
                const response = await fetch(URL + "?t=" + Date.now());
                const data = await response.json();
                
                document.getElementById('money').innerText = "$" + data.money.toLocaleString();
                document.getElementById('info').innerText = "LVL: " + data.score + " | " + data.session + "m";
            } catch (e) {
                document.getElementById('info').innerText = "Ошибка сети";
            }
        }
        loadData();
    </script>
</body>
</html>
