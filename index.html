<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Studio Elite OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050505; --card: #111113; --accent: #e91e63; --text: #ffffff; --dim: #71717a; --success: #4ade80; --danger: #ff4b2b; --gold: #facc15; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth UI */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: #000; color: #fff; outline: none; }
        .primary-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; }
        
        /* App Layout */
        #app { height: 100vh; display: none; flex-direction: column; }
        .page { display: none; padding: 25px 20px; flex-grow: 1; overflow-y: auto; padding-bottom: 110px; }
        .active-page { display: block; }

        /* Admin UI */
        .user-card { background: #18181b; padding: 18px; border-radius: 24px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 8px; font-weight: 900; text-transform: uppercase; margin-left: 5px; }
        .badge-admin { background: var(--gold); color: #000; }
        .badge-owner { background: var(--accent); color: #fff; }

        .admin-actions { display: flex; gap: 10px; margin-top: 15px; align-items: center; flex-wrap: wrap; }
        .lvl-select { background: #000; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 10px; font-size: 13px; font-weight: 700; }
        
        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(17,17,19,0.9); backdrop-filter: blur(20px); border-radius: 28px; display: flex; padding: 8px; border: 1px solid rgba(255,255,255,0.08); }
        .nav-link { flex: 1; padding: 14px; text-align: center; color: var(--dim); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="margin-bottom:20px; letter-spacing:-1px;">DS STUDIO</h1>
            <div style="display:flex; background:#000; padding:4px; border-radius:14px; margin-bottom:20px">
                <div id="t-login" style="flex:1; padding:12px; cursor:pointer; border-radius:10px; font-weight:800; font-size:12px;" onclick="setMode('login')">ВХОД</div>
                <div id="t-reg" style="flex:1; padding:12px; cursor:pointer; border-radius:10px; font-weight:800; font-size:12px;" onclick="setMode('reg')">РЕГИСТРАЦИЯ</div>
            </div>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="primary-btn" onclick="handleAuth()">ПРОДОЛЖИТЬ</button>
            <p id="err" style="color:var(--accent); font-size:12px; margin-top:15px; font-weight:600;"></p>
        </div>
    </div>

    <div id="app">
        <div id="p-home" class="page active-page">
            <div style="margin-top:120px; text-align:center; opacity:0.1"><h1>DS STUDIO</h1></div>
        </div>

        <div id="p-profile" class="page">
            <h2 id="u-nick-disp" style="font-size:28px;">User</h2>
            <div id="u-role-disp" style="margin-top:8px"></div>
            
            <div style="background:var(--card); padding:25px; border-radius:28px; margin-top:25px; border:1px solid rgba(255,255,255,0.03)">
                <span style="color:var(--dim); font-size:11px; font-weight:800; letter-spacing:1px;">ВАШ БАЛАНС</span>
                <h1 style="color:var(--success); font-size:40px; margin-top:5px; font-weight:900;">$ <span id="u-bal-disp">0</span></h1>
            </div>
            <button class="primary-btn" style="margin-top:30px; background:#1a1a1c; color:var(--danger)" onclick="location.reload()">ВЫЙТИ</button>
        </div>

        <div id="p-admin" class="page">
            <h2 style="margin-bottom:20px;">Админ-центр</h2>
            <input type="text" id="a-search" placeholder="Поиск по нику..." oninput="renderAdminList()" style="background:var(--card); margin-bottom:20px;">
            <div id="admin-list"></div>
        </div>

        <nav class="nav" id="menu">
            <div class="nav-link active" onclick="tab('p-home', this)">Главная</div>
            <div class="nav-link" onclick="tab('p-profile', this)">Профиль</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            authDomain: "ds-studio-app.firebaseapp.com",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.firebasestorage.app",
            messagingSenderId: "456035914456",
            appId: "1:456035914456:web:e2cdbc7e77563a9c7d7dad"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getDatabase(fApp);
        const tg = window.Telegram.WebApp;
        
        let mode = 'login';
        let me = null;
        let allUsers = {};

        window.setMode = (m) => {
            mode = m;
            document.getElementById('t-login').style.background = m === 'login' ? '#e91e63' : 'transparent';
            document.getElementById('t-reg').style.background = m === 'reg' ? '#e91e63' : 'transparent';
            document.getElementById('err').innerText = "";
        };
        setMode('login');

        window.handleAuth = async () => {
            const nick = document.getElementById('nick').value.trim();
            const pass = document.getElementById('pass').value.trim();
            if(!nick || !pass) return;
            const uRef = ref(db, 'users/' + nick);
            const snap = await get(uRef);

            if(mode === 'login') {
                if(snap.exists() && snap.val().password === pass) runApp(snap.val());
                else document.getElementById('err').innerText = "Неверный ник или пароль";
            } else {
                if(snap.exists()) document.getElementById('err').innerText = "Ник уже занят";
                else {
                    const data = { nickname: nick, password: pass, balance: 100, role: 'user', adminLvl: 0, regDate: Date.now() };
                    if(nick.toLowerCase() === 'derrick') { data.role = 'admin'; data.adminLvl = 5; }
                    await set(uRef, data);
                    runApp(data);
                }
            }
        };

        function runApp(user) {
            me = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('u-nick-disp').innerText = user.nickname;
            
            onValue(ref(db, 'users/' + user.nickname), s => {
                const d = s.val() || {};
                document.getElementById('u-bal-disp').innerText = d.balance || 0;
                let roleTag = d.adminLvl > 0 ? `<span class="badge badge-admin">LVL ${d.adminLvl}</span>` : '';
                if(d.adminLvl === 5) roleTag = `<span class="badge badge-owner">OWNER</span>`;
                document.getElementById('u-role-disp').innerHTML = roleTag;
            });

            if(user.adminLvl > 0) {
                const menu = document.getElementById('menu');
                if(!document.getElementById('adm-btn-nav')) {
                    const btn = document.createElement('div');
                    btn.id = 'adm-btn-nav'; btn.className = 'nav-link'; btn.innerText = 'Админ';
                    btn.onclick = function() { tab('p-admin', this) };
                    menu.appendChild(btn);
                    loadAdminData();
                }
            }
        }

        function loadAdminData() {
            onValue(ref(db, 'users'), snap => {
                allUsers = snap.val() || {};
                renderAdminList();
            });
        }

        window.renderAdminList = () => {
            const list = document.getElementById('admin-list');
            const search = document.getElementById('a-search').value.toLowerCase();
            list.innerHTML = "";
            
            for(let nick in allUsers) {
                const u = allUsers[nick];
                if(!nick.toLowerCase().includes(search)) continue;

                const card = document.createElement('div');
                card.className = 'user-card';
                
                const isTargetOwner = u.adminLvl === 5;
                const isMeOwner = me.adminLvl === 5;

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <b style="font-size:16px">${u.nickname} ${u.adminLvl > 0 ? `<span class="badge ${isTargetOwner ? 'badge-owner' : 'badge-admin'}">${isTargetOwner ? 'OWNER' : 'LVL '+u.adminLvl}</span>` : ''}</b>
                        <span style="color:var(--success); font-weight:900">$${u.balance}</span>
                    </div>
                    <div class="admin-actions">
                        ${!isTargetOwner ? `
                            <input type="number" class="lvl-select" style="width:80px" value="${u.balance}" onchange="changeBal('${nick}', this.value)">
                        ` : '<span style="color:var(--dim); font-size:10px; font-weight:700">ЗАЩИЩЕНО</span>'}

                        ${isMeOwner && nick !== me.nickname ? `
                            <select class="lvl-select" onchange="changeLvl('${nick}', this.value)">
                                <option value="0" ${u.adminLvl==0?'selected':''}>User</option>
                                <option value="1" ${u.adminLvl==1?'selected':''}>Lvl 1</option>
                                <option value="2" ${u.adminLvl==2?'selected':''}>Lvl 2</option>
                                <option value="3" ${u.adminLvl==3?'selected':''}>Lvl 3</option>
                                <option value="4" ${u.adminLvl==4?'selected':''}>Lvl 4</option>
                            </select>
                        ` : ''}

                        ${!isTargetOwner ? `
                            <button onclick="delUser('${nick}')" style="background:none; border:none; color:var(--danger); font-size:11px; font-weight:800; margin-left:auto; cursor:pointer">УДАЛИТЬ</button>
                        ` : ''}
                    </div>
                `;
                list.appendChild(card);
            }
        };

        window.changeBal = async (n, v) => {
            const snap = await get(ref(db, 'users/'+n));
            if(snap.exists() && snap.val().adminLvl === 5) { alert("Запрещено!"); return; }
            update(ref(db, 'users/'+n), {balance: parseInt(v) || 0});
        };

        window.changeLvl = (n, l) => {
            if(me.adminLvl !== 5) return;
            update(ref(db, 'users/'+n), {adminLvl: parseInt(l), role: parseInt(l) > 0 ? 'admin' : 'user'});
        };

        window.delUser = async (n) => {
            const snap = await get(ref(db, 'users/'+n));
            if(snap.exists() && snap.val().adminLvl === 5) { alert("Нельзя удалить OWNER!"); return; }
            if(confirm('Удалить ' + n + '?')) remove(ref(db, 'users/'+n));
        };

        window.tab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        };
    </script>
</body>
</html>
