<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KKSTUDIO Stats</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg: var(--tg-theme-bg-color, #1a1a1a);
            --tg-theme-text: var(--tg-theme-text-color, #ffffff);
            --accent: #3390ec;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg);
            background: linear-gradient(180deg, var(--tg-theme-bg) 0%, #000 100%);
            color: var(--tg-theme-text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #3390ec, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .card-wide { grid-column: span 2; }

        .icon { font-size: 28px; margin-bottom: 10px; }
        .label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }

        .status-badge {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }

        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            margin-right: 8px; background: #4cd964;
            box-shadow: 0 0 10px #4cd964;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(90deg, #3390ec, #007aff);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(51, 144, 236, 0.3);
        }

        /* Адаптация под темную тему Telegram */
        body.light { --card-bg: rgba(0, 0, 0, 0.05); --tg-theme-text: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KKSTUDIO Dashboard</h1>
        <div class="status-badge">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">ИГРОК В СЕТИ</span>
        </div>
    </div>

    <div class="grid">
        <div class="card" onclick="vibrate()">
            <div class="icon">💰</div>
            <div class="label">Наличные</div>
            <div id="money" class="value">$0</div>
        </div>

        <div class="card" onclick="vibrate()">
            <div class="icon">🏆</div>
            <div class="label">Уровень</div>
            <div id="score" class="value">0</div>
        </div>

        <div class="card card-wide" onclick="vibrate()">
            <div class="icon">📍</div>
            <div class="label">Район города</div>
            <div id="location" class="value">Загрузка данных...</div>
        </div>
        
        <div class="card card-wide" style="border: none; background: transparent; box-shadow: none;">
             <div class="label">Последнее обновление</div>
             <div id="time" style="font-size: 14px; color: #666;">--:--:--</div>
        </div>
    </div>

    <button class="main-btn" onclick="updateData()">ОБНОВИТЬ СТАТИСТИКУ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // --- ДАННЫЕ (ВСТАВЬ СВОИ) ---
        const BIN_ID = "ТВОЙ_BIN_ID";
        const API_KEY = "ТВОЙ_КЛЮЧ";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

        function vibrate() {
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function updateData() {
            vibrate();
            const btn = document.querySelector('.main-btn');
            btn.innerText = "ЗАГРУЗКА...";
            
            try {
                const response = await fetch(URL, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const data = (await response.json()).record;

                document.getElementById('money').innerText = "$" + data.money.toLocaleString();
                document.getElementById('score').innerText = data.score;
                document.getElementById('location').innerText = data.location || "San Andreas";
                document.getElementById('time').innerText = new Date().toLocaleTimeString();

            } catch (e) {
                tg.showAlert("Ошибка связи с базой данных!");
            } finally {
                btn.innerText = "ОБНОВИТЬ СТАТИСТИКУ";
            }
        }

        // Автообновление раз в 30 секунд
        setInterval(updateData, 30000);
        updateData();
    </script>
</body>
</html>
