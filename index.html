<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arzmob Store | Рынок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #dee2e6;
            border-top-color: #6c757d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Скрываем кнопку добавления, если пользователь не авторизован */
        .add-button.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>

    <div class="page-container">
        <!-- Плавающая кнопка добавления (будет показана, только если есть user) -->
        <a href="tovar.html" class="add-button" id="addButton"><i class="fas fa-plus-circle"></i> Добавить</a>

        <div class="container">
            <!-- Фильтры -->
            <div class="filter-card">
                <div class="filter-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Поиск по названию...">
                    </div>
                    <div class="sort-box">
                        <select id="categorySelect">
                            <option value="all">Все категории</option>
                            <option value="accessories">Аксессуары</option>
                            <option value="resources">Ресурсы</option>
                            <option value="realty">Недвижимость</option>
                            <option value="transport">Транспорт</option>
                        </select>
                    </div>
                    <div class="sort-box">
                        <select id="sortSelect">
                            <option value="dateDesc">🕒 Сначала новые</option>
                            <option value="priceAsc">💰 Сначала дешёвые</option>
                            <option value="priceDesc">💰 Сначала дорогие</option>
                            <option value="viewsDesc">👁 Самые активные</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Товары -->
            <div id="itemsContainer" class="items-grid">
                <div class="no-items"><i class="fas fa-spinner fa-pulse"></i><br>Загрузка...</div>
            </div>

            <!-- Пагинация -->
            <div class="pagination">
                <button id="prevPage" disabled><i class="fas fa-chevron-left"></i> Назад</button>
                <span id="pageInfo">Страница 1</span>
                <button id="nextPage">Вперёд <i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="watermark">
                <i class="fas fa-store"></i> Arzmob Store 2026 — площадка для игроков Arizona Mobile
            </div>
        </div>

        <!-- Нижняя панель (рынок, профиль) -->
        <div class="bottom-nav">
            <a href="index.html" class="bottom-nav-item active">
                <i class="fas fa-store"></i>
                <span>Рынок</span>
            </a>
            <a href="profile.html" class="bottom-nav-item">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
        </div>
    </div>

    <script>
        (function() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                Telegram.WebApp.setHeaderColor('#6c757d');
                Telegram.WebApp.setBackgroundColor('#e9ecef');
                // Кнопка закрытия Telegram
                const closeBtn = document.createElement('button');
                closeBtn.className = 'icon-btn';
                closeBtn.innerHTML = '<i class="fas fa-times"></i>';
                closeBtn.title = 'Закрыть';
                closeBtn.style.position = 'fixed';
                closeBtn.style.top = 'calc(12px + env(safe-area-inset-top, 0px))';
                closeBtn.style.right = '12px';
                closeBtn.style.zIndex = '1002';
                closeBtn.onclick = () => Telegram.WebApp.close();
                document.body.appendChild(closeBtn);
            }
            window.addEventListener('load', async function() {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 300);
                }

                // Автоматическая авторизация через Telegram
                try {
                    const { telegramAuth, getCurrentUser } = await import('./helpers.js');
                    const user = await telegramAuth();
                    if (user) {
                        // Показываем кнопку добавления
                        document.getElementById('addButton').classList.remove('hidden');
                    } else {
                        // Если не удалось авторизоваться (не в Telegram), скрываем кнопку добавления
                        document.getElementById('addButton').classList.add('hidden');
                    }
                } catch (e) {
                    console.warn('Telegram auth error', e);
                    document.getElementById('addButton').classList.add('hidden');
                }
            });
        })();
    </script>

    <script type="module" src="index.js"></script>
</body>
</html>
