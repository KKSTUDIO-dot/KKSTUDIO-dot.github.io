<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arzmob Store</title>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнительные стили для прелоадера (уже есть в style.css, но дублируем для надёжности) */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #dee2e6;
            border-top-color: #6c757d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Прелоадер -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <!-- Шапка (без кнопки назад, так как это главная) -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-store"></i> Arzmob
            </div>
            <div class="nav">
                <button class="nav-btn active" data-type="all"><i class="fas fa-list-ul"></i> Все</button>
                <button class="nav-btn" data-type="sale"><i class="fas fa-tag"></i> Продажа</button>
                <button class="nav-btn" data-type="buy"><i class="fas fa-cart-shopping"></i> Покупка</button>
                <button class="nav-btn" data-type="rent"><i class="fas fa-hand-holding-dollar"></i> Аренда</button>
                <button class="nav-btn" data-type="ad"><i class="fas fa-bullhorn"></i> Реклама</button>
            </div>
            <div class="header-actions">
                <a href="tovar.html" class="add-btn"><i class="fas fa-plus-circle"></i> Добавить</a>
                <div id="guestMenu">
                    <a href="login.html" class="icon-btn" title="Войти"><i class="fas fa-sign-in-alt"></i></a>
                    <a href="register.html" class="icon-btn" title="Регистрация"><i class="fas fa-user-plus"></i></a>
                </div>
                <div id="userMenu" style="display: none;">
                    <span class="user-nick" id="userNickDisplay"></span>
                    <a href="profile.html" class="icon-btn" title="Профиль"><i class="fas fa-user"></i></a>
                    <a href="admin.html" class="icon-btn" title="Админка" id="adminLink" style="display: none;"><i class="fas fa-cog"></i></a>
                    <button class="icon-btn" id="logoutBtn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <!-- Кнопка закрытия Telegram (видна только внутри Telegram) -->
                <button class="icon-btn" id="closeTelegramBtn" title="Закрыть" style="display: none;"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filter-card">
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по названию...">
                </div>
                <div class="sort-box">
                    <select id="categorySelect">
                        <option value="all">Все категории</option>
                        <option value="accessories">Аксессуары</option>
                        <option value="resources">Ресурсы</option>
                        <option value="realty">Недвижимость</option>
                        <option value="transport">Транспорт</option>
                    </select>
                </div>
                <div class="sort-box">
                    <select id="sortSelect">
                        <option value="dateDesc">🕒 Сначала новые</option>
                        <option value="priceAsc">💰 Сначала дешёвые</option>
                        <option value="priceDesc">💰 Сначала дорогие</option>
                        <option value="viewsDesc">👁 Самые активные</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Товары -->
        <div id="itemsContainer" class="items-grid">
            <div class="no-items"><i class="fas fa-spinner fa-pulse"></i><br>Загрузка...</div>
        </div>

        <!-- Пагинация -->
        <div class="pagination">
            <button id="prevPage" disabled><i class="fas fa-chevron-left"></i> Назад</button>
            <span id="pageInfo">Страница 1</span>
            <button id="nextPage">Вперёд <i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- Водяной знак -->
        <div class="watermark">
            <i class="fas fa-store"></i> Arzmob Store 2026 — площадка для игроков Arizona Mobile
        </div>
    </div>

    <!-- Скрипт для Telegram и прелоадера -->
    <script>
        (function() {
            // Инициализация Telegram
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand(); // развернуть на весь экран
                // Показать кнопку закрытия
                const closeBtn = document.getElementById('closeTelegramBtn');
                if (closeBtn) {
                    closeBtn.style.display = 'inline-flex';
                    closeBtn.addEventListener('click', () => Telegram.WebApp.close());
                }
                // Настройка цветов (опционально)
                Telegram.WebApp.setHeaderColor('#6c757d');
                Telegram.WebApp.setBackgroundColor('#e9ecef');
            }

            // Скрыть прелоадер после полной загрузки
            window.addEventListener('load', function() {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => {
                        preloader.style.display = 'none';
                    }, 300);
                }
            });
        })();
    </script>

    <!-- Основной скрипт модуля (логика главной) -->
    <script type="module" src="index.js"></script>
</body>
</html>
