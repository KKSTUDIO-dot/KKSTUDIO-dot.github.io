<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Studio App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0f17;
            --card-bg: #1c2030;
            --accent: #e91e63;
            --text-main: #ffffff;
            --text-dim: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loader-wrapper { width: 280px; text-align: center; }
        .line-bg { height: 1px; background: #1a1a1a; margin-bottom: 30px; position: relative; overflow: hidden; }
        #fill { height: 100%; background: #fff; width: 0%; box-shadow: 0 0 10px #fff; transition: width 0.2s; }
        .logo { font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* Main App */
        #app { height: 100vh; opacity: 0; transition: opacity 0.5s ease; display: flex; flex-direction: column; }
        .show { opacity: 1 !important; }
        .page { display: none; padding: 40px 25px; flex-grow: 1; }
        .active-page { display: block; }

        .profile-content {
            display: flex; align-items: center; gap: 15px;
            background: var(--card-bg); padding: 20px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .avatar { 
            width: 60px; height: 60px; 
            background: linear-gradient(to top right, #fb923c, #ec4899); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; text-transform: uppercase;
        }
        .user-info h2 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
        .badge { font-size: 10px; color: var(--text-dim); font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }

        /* Баланс */
        .balance-card {
            margin-top: 20px;
            background: linear-gradient(135deg, #1c2030 0%, #0d0f17 100%);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .balance-label { color: var(--text-dim); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .balance-value { font-size: 32px; font-weight: 900; color: #4ade80; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: rgba(28, 32, 48, 0.9); backdrop-filter: blur(15px);
            border-radius: 25px; display: flex; padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: var(--text-dim); padding: 10px;
            font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader-wrapper">
            <div class="line-bg"><div id="fill"></div></div>
            <div class="logo">DS <span>STUDIO</span></div>
        </div>
    </div>

    <div id="app">
        <div id="home-page" class="page active-page">
            <h1 style="text-align: center; color: var(--text-dim); margin-top: 50px;">Главная</h1>
        </div>

        <div id="profile-page" class="page">
            <div class="profile-content">
                <div class="avatar" id="u-pic">?</div>
                <div class="user-info">
                    <h2 id="u-name">Загрузка...</h2>
                    <div class="badge">STUDIO MEMBER</div>
                </div>
            </div>

            <div class="balance-card">
                <div class="balance-label">Ваш баланс</div>
                <div class="balance-value"><span id="u-balance">0</span> $</div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showPage('home-page', this)">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Главная
            </div>
            <div class="nav-item" onclick="showPage('profile-page', this)">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Профиль
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ТВОИ ДАННЫЕ ИЗ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            authDomain: "ds-studio-app.firebaseapp.com",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.firebasestorage.app",
            messagingSenderId: "456035914456",
            appId: "1:456035914456:web:e2cdbc7e77563a9c7d7dad"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getDatabase(fApp);

        const tg = window.Telegram.WebApp;
        tg.ready();

        async function syncUser(user) {
            const userRef = ref(db, 'users/' + user.id);
            
            onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('u-balance').innerText = data.balance || 0;
                } else {
                    set(userRef, {
                        name: user.first_name,
                        username: user.username || "none",
                        balance: 100 
                    });
                }
            });
        }

        window.showPage = (pageId, element) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            element.classList.add('active');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        window.addEventListener('load', () => {
            const fill = document.getElementById('fill');
            let p = 0;
            const timer = setInterval(() => {
                p += 33;
                if (p >= 100) {
                    p = 100;
                    clearInterval(timer);
                    setTimeout(() => {
                        document.getElementById('splash').style.opacity = '0';
                        document.getElementById('app').classList.add('show');
                        setTimeout(() => document.getElementById('splash').remove(), 500);
                    }, 300);
                }
                fill.style.width = p + '%';
            }, 100);

            if (tg.initDataUnsafe?.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('u-name').innerText = u.username ? `@${u.username}` : u.first_name;
                document.getElementById('u-pic').innerText = u.first_name[0];
                syncUser(u);
            } else {
                // Тестовый режим для ПК
                document.getElementById('u-name').innerText = "DS Developer";
                document.getElementById('u-pic').innerText = "D";
            }
        });
    </script>
</body>
</html>
