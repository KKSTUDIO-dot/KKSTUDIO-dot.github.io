<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KKSTUDIO iOS 26</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .status { font-size: 12px; color: #32d74b; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card { background: var(--card); width: 85%; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .val { font-size: 42px; font-weight: 700; margin: 10px 0; }
        .label { color: #8e8e93; font-size: 14px; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item { background: #2c2c2e; padding: 15px; border-radius: 18px; }
        .update-btn { margin-top: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: none; outline: none; }
        .update-btn:active { transform: scale(0.9); opacity: 0.8; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="status">● Система Активна</div>
    <div class="card">
        <div class="label">Наличные</div>
        <div id="money" class="val">$0</div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="label">Уровень</div>
                <div id="score" style="font-size: 20px; font-weight: bold;">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Сессия</div>
                <div id="session" style="font-size: 20px; font-weight: bold;">0m</div>
            </div>
        </div>
    </div>

    <button id="updateBtn" class="update-btn" onclick="updateData()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ТВОЯ ССЫЛКА ИЗ GOOGLE APPS SCRIPT
        const URL = "https://script.google.com/macros/s/AKfycbz1e9WPTLnKu2zQFledPKNae2KybiIjfi8VR_Oo9YkOwarUiQBzpHWFzKAkdo_8RiTN/exec";

        async function updateData() {
            const btn = document.getElementById('updateBtn');
            btn.classList.add('loading');
            tg.HapticFeedback.impactOccurred('medium');

            try {
                const response = await fetch(URL);
                const data = await response.json();
                
                document.getElementById('money').innerText = "$" + Number(data.money).toLocaleString();
                document.getElementById('score').innerText = data.score;
                document.getElementById('session').innerText = data.session + "m";
            } catch (e) {
                console.error("Ошибка:", e);
            } finally {
                setTimeout(() => btn.classList.remove('loading'), 800);
            }
        }
        // Авто-загрузка при старте
        updateData();
    </script>
</body>
</html>
