<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arizona RP | Маркетплейс</title>
    <link rel="stylesheet" href="style/main.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h3><i class="fas fa-store"></i> Актуальные предложения</h3>
            <button id="openModalBtn" class="add-btn"><i class="fas fa-plus-circle"></i> Подать объявление</button>
        </div>
        <div id="adsList" class="ads-grid"></div>
    </div>

    <!-- Модальное окно для подачи объявления -->
    <div id="adModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> Подать объявление</h3>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <form id="adForm">
                <div class="form-group">
                    <label>Название товара / услуги</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>Тип объявления</label>
                    <select id="type">
                        <option value="sale">💰 Продажа</option>
                        <option value="purchase">🛍️ Покупка</option>
                        <option value="rent">🏷️ Аренда</option>
                        <option value="advertising">📢 Реклама</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="category">
                        <option value="transport">🚗 Транспорт</option>
                        <option value="resources">⛏️ Ресурсы</option>
                        <option value="houses">🏠 Дома</option>
                        <option value="accessories">👕 Аксессуары</option>
                        <option value="businesses">🏢 Бизнесы</option>
                        <option value="advertising">📢 Реклама</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Цена ($)</label>
                    <input type="number" id="price" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Иконка (Font Awesome class)</label>
                    <input type="text" id="icon" placeholder="fa-car" value="fa-tag">
                </div>
                <button type="submit" class="submit-btn">Отправить на модерацию</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно для деталей объявления -->
    <div id="detailsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailsTitle">Детали объявления</h3>
                <button class="close-modal" id="closeDetailsBtn">&times;</button>
            </div>
            <div id="detailsContent"></div>
        </div>
    </div>

    <!-- Нижнее меню -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Главная</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </a>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { ensureUserProfile, createAd } from "./utils.js";
        import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentUser = null;
        let allAds = [];

        const typeNames = {
            sale: "💰 Продажа",
            purchase: "🛍️ Покупка",
            rent: "🏷️ Аренда",
            advertising: "📢 Реклама"
        };
        const categoryNames = {
            transport: "🚗 Транспорт",
            resources: "⛏️ Ресурсы",
            houses: "🏠 Дома",
            accessories: "👕 Аксессуары",
            businesses: "🏢 Бизнесы",
            advertising: "📢 Реклама"
        };

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderAds(ads) {
            const container = document.getElementById("adsList");
            const approved = ads.filter(ad => ad.status === "approved");
            if (approved.length === 0) {
                container.innerHTML = '<div class="empty-state">😢 Нет активных объявлений. Будьте первым!</div>';
                return;
            }
            container.innerHTML = approved.map(ad => `
                <div class="ad-card" data-id="${ad.id}">
                    <div class="ad-title"><i class="fas ${ad.icon || 'fa-tag'}"></i> ${escapeHtml(ad.title)}</div>
                    <div class="ad-price">${Number(ad.price).toLocaleString()} $</div>
                    <div class="ad-desc">${escapeHtml(ad.description)}</div>
                    <div class="ad-meta">
                        <span class="badge-category">${categoryNames[ad.category] || ad.category}</span>
                        <span class="badge-type">${typeNames[ad.type] || ad.type}</span>
                        <span>📅 ${new Date(ad.createdAt).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');

            // Навешиваем обработчики на карточки
            document.querySelectorAll('.ad-card').forEach(card => {
                card.addEventListener('click', () => {
                    const adId = card.dataset.id;
                    const ad = approved.find(a => a.id === adId);
                    if (ad) showDetails(ad);
                });
            });
        }

        function showDetails(ad) {
            const modal = document.getElementById("detailsModal");
            const content = document.getElementById("detailsContent");
            const userLink = ad.userId ? `tg://user?id=${ad.userId}` : `https://t.me/${ad.username || ''}`;
            content.innerHTML = `
                <div class="details-block">
                    <p><strong>Название:</strong> ${escapeHtml(ad.title)}</p>
                    <p><strong>Тип:</strong> ${typeNames[ad.type] || ad.type}</p>
                    <p><strong>Категория:</strong> ${categoryNames[ad.category] || ad.category}</p>
                    <p><strong>Цена:</strong> ${Number(ad.price).toLocaleString()} $</p>
                    <p><strong>Описание:</strong><br>${escapeHtml(ad.description)}</p>
                    <p><strong>Дата:</strong> ${new Date(ad.createdAt).toLocaleString()}</p>
                    <button id="contactSellerBtn" class="submit-btn" style="margin-top: 16px;">
                        <i class="fab fa-telegram"></i> Связаться с продавцом
                    </button>
                </div>
            `;
            modal.style.display = "flex";

            document.getElementById("contactSellerBtn").addEventListener("click", () => {
                const url = `https://t.me/${ad.username ? ad.username : ''}`;
                if (url) window.open(url, '_blank');
                else tg.showPopup({ title: "Ошибка", message: "Не удалось определить контакт продавца", buttons: [{ type: "ok" }] });
            });
        }

        async function init() {
            currentUser = await ensureUserProfile();
            const adsRef = ref(db, 'ads');
            onValue(adsRef, (snapshot) => {
                const data = snapshot.val();
                allAds = data ? Object.values(data) : [];
                renderAds(allAds);
            });

            // Модалка подачи объявления
            const modal = document.getElementById("adModal");
            const openBtn = document.getElementById("openModalBtn");
            const closeBtn = document.getElementById("closeModalBtn");

            if (openBtn && modal) {
                openBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    modal.style.display = "flex";
                });
                closeBtn.addEventListener("click", () => {
                    modal.style.display = "none";
                });
                window.addEventListener("click", (e) => {
                    if (e.target === modal) modal.style.display = "none";
                });
            }

            // Модалка деталей
            const detailsModal = document.getElementById("detailsModal");
            const closeDetailsBtn = document.getElementById("closeDetailsBtn");
            if (closeDetailsBtn && detailsModal) {
                closeDetailsBtn.addEventListener("click", () => {
                    detailsModal.style.display = "none";
                });
                window.addEventListener("click", (e) => {
                    if (e.target === detailsModal) detailsModal.style.display = "none";
                });
            }
        }

        // Обработка формы
        document.getElementById("adForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!currentUser) {
                alert("Пользователь не авторизован");
                return;
            }
            const title = document.getElementById("title").value.trim();
            const type = document.getElementById("type").value;
            const category = document.getElementById("category").value;
            const price = parseFloat(document.getElementById("price").value);
            const description = document.getElementById("description").value.trim();
            const icon = document.getElementById("icon").value.trim() || "fa-tag";

            if (!title || !price || !description) {
                alert("Заполните все поля");
                return;
            }

            try {
                await createAd({
                    userId: currentUser.id,
                    title,
                    type,
                    category,
                    price,
                    description,
                    icon,
                });
                tg.showPopup({
                    title: "✅ Отправлено",
                    message: "Ваше объявление отправлено на модерацию",
                    buttons: [{ type: "ok" }]
                });
                document.getElementById("adForm").reset();
                document.getElementById("adModal").style.display = "none";
            } catch (err) {
                console.error(err);
                alert("Ошибка при отправке");
            }
        });

        init();
    </script>
</body>
</html>
