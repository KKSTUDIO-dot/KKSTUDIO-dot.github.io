<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arizona Player Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff8c00; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #222; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2 span { color: var(--orange); }
        label { font-size: 11px; color: var(--orange); font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; background: var(--orange); border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        
        /* Profile Layout */
        #profile-view { display: none; }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; border: 1px solid #252525; }
        .box small { display: block; font-size: 10px; color: #777; margin-bottom: 4px; }
        .box b { font-size: 14px; color: #eee; }
        .money-green { color: #2ecc71 !important; }
        .loader { display: none; text-align: center; color: var(--orange); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div id="login-view" class="card">
        <header style="text-align:center"><h2>ARIZONA <span>FINDER</span></h2></header>
        
        <label>Никнейм</label>
        <input type="text" id="nick" placeholder="Sam_Mason">
        
        <label>Сервер</label>
        <select id="server">
            <option value="1">01 - Phoenix</option><option value="2">02 - Tucson</option>
            <option value="3">03 - Scottdale</option><option value="10">10 - Surprise</option>
            <option value="20">20 - Sun-City</option><option value="30">30 - Love</option>
        </select>
        
        <button class="btn" onclick="searchPlayer()">НАЙТИ ИГРОКА</button>
        <div id="loading" class="loader">ПОДКЛЮЧЕНИЕ К API...</div>
    </div>

    <div id="profile-view" class="card">
        <div class="profile-header">
            <h2 id="res-nick" style="margin:0">Nick_Name</h2>
            <p id="res-server" style="color:var(--orange); font-size:13px; font-weight:700; margin:5px 0"></p>
        </div>

        <div class="stats-grid">
            <div class="box"><small>LVL (EXP)</small><b id="res-lvl">0 (0/0)</b></div>
            <div class="box"><small>VIP</small><b id="res-vip">-</b></div>
            <div class="box"><small>НА РУКАХ</small><b id="res-hand" class="money-green">$ 0</b></div>
            <div class="box"><small>В БАНКЕ</small><b id="res-bank" class="money-green">$ 0</b></div>
            <div class="box"><small>ДЕПОЗИТ</small><b id="res-dep" class="money-green">$ 0</b></div>
            <div class="box"><small>ОРГАНИЗАЦИЯ</small><b id="res-org">-</b></div>
            <div class="box"><small>ТЕЛЕФОН</small><b id="res-phone">-</b></div>
            <div class="box"><small>ОТЫГРАНО</small><b id="res-hours">0 ч.</b></div>
        </div>

        <button class="btn" style="margin-top:20px; background:#333" onclick="location.reload()">НАЗАД</button>
    </div>
</div>

<script>
    async function searchPlayer() {
        const nick = document.getElementById('nick').value.trim();
        const sid = document.getElementById('server').value;
        const loader = document.getElementById('loading');
        
        if(!nick.includes('_')) return alert("Введите ник с нижним подчеркиванием!");

        loader.style.display = 'block';

        // ТВОЙ КЛЮЧ И URL
        const apiKey = 'BIj8OHrAlrhghiYkIjsWfRmNEJ8Ysth5';
        const url = `https://api.depscian.tech/v2/player/find?nickname=${nick}&serverId=${sid}`;

        // Настройка прокси AllOrigins (необходим для GitHub Pages)
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

        try {
            // ВАЖНО: AllOrigins не прокидывает Headers в бесплатной версии автоматически, 
            // но твое API может требовать ключ в параметрах или заголовках.
            // Попробуем отправить запрос с заголовком через прокси.
            
            const response = await fetch(proxy, {
                headers: {
                    "X-API-Key": apiKey
                }
            });

            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if(data && data.id) {
                // Заполняем данными из твоего JSON
                document.getElementById('res-nick').innerText = nick;
                document.getElementById('res-server').innerText = data.server?.name || "Arizona";
                
                // Уровень и EXP
                document.getElementById('res-lvl').innerText = `${data.level.level} (${data.level.current_exp}/${data.level.next_exp})`;
                
                // Деньги (Форматируем через Intl)
                const fmt = new Intl.NumberFormat();
                document.getElementById('res-hand').innerText = `$ ${fmt.format(data.money.hand)}`;
                document.getElementById('res-bank').innerText = `$ ${fmt.format(data.money.bank)}`;
                document.getElementById('res-dep').innerText = `$ ${fmt.format(data.money.deposit)}`;
                
                // Прочее
                document.getElementById('res-vip').innerText = data.vip_info.level || "Нет";
                document.getElementById('res-org').innerText = data.organization?.name || "Нет";
                document.getElementById('res-phone').innerText = data.phone_number || "Нет";
                document.getElementById('res-hours').innerText = data.hours_played + " ч.";

                // Переключаем вид
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('profile-view').style.display = 'block';
            } else {
                alert("Игрок не найден. Проверьте ник и сервер.");
            }
        } catch(e) {
            console.error(e);
            alert("Ошибка запроса. Проверьте ключ API или лимиты запросов.");
        } finally {
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
