<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMP Monitor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #252525;
            --accent-color: #248bcf;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --success: #34c759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            text-align: left;
            margin-bottom: 24px;
            padding-left: 8px;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
            background: linear-gradient(45deg, #248bcf, #5ac8fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        .card:active { transform: scale(0.98); }

        .card-full { grid-column: span 2; }

        .label {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 20px;
            font-weight: 700;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .btn-refresh {
            margin-top: 24px;
            width: 100%;
            max-width: 500px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-info {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SAMP Live</h1>
        <div style="font-size: 14px; color: var(--text-secondary);">Персональная статистика</div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <span class="label">💵 Наличные</span>
            <span id="money" class="value">$0</span>
        </div>

        <div class="card">
            <span class="label">⭐ Уровень</span>
            <span id="score" class="value">0</span>
        </div>

        <div class="card card-full">
            <span class="label">📍 Местоположение</span>
            <span id="location" class="value">Загрузка...</span>
        </div>

        <div class="card card-full" style="display: flex; justify-content: space-between; align-items: center;">
            <span class="label" style="margin: 0;">Статус сервера</span>
            <div style="display: flex; align-items: center;">
                <span id="dot" class="status-dot"></span>
                <span id="status" class="value" style="font-size: 16px;">Online</span>
            </div>
        </div>
    </div>

    <button class="btn-refresh" onclick="updateData()">Обновить данные</button>
    
    <div class="footer-info">Последнее обновление: <span id="time">--:--</span></div>

    <script>
        const BIN_ID = "ТВОЙ_АЙДИ"; 
        const API_KEY = "ТВОЙ_КЛЮЧ";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

        async function updateData() {
            try {
                const response = await fetch(URL, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const res = await response.json();
                const data = res.record;

                document.getElementById('money').innerText = "$" + data.money.toLocaleString();
                document.getElementById('score').innerText = data.score;
                document.getElementById('location').innerText = data.location || "Неизвестно";
                document.getElementById('time').innerText = new Date().toLocaleTimeString();
                
                // Обработка статуса
                const statusText = data.status || "Offline";
                document.getElementById('status').innerText = statusText;
                document.getElementById('dot').style.display = statusText === "Online" ? "inline-block" : "none";

            } catch (e) {
                console.error("Ошибка:", e);
            }
        }

        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        updateData();
        setInterval(updateData, 15000); // Авто-обновление раз в 15 сек
    </script>
</body>
</html>
