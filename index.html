<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KKSTUDIO Stats</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #3390ec;
            --text: #ffffff;
            --secondary: #888888;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: center;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .stat-card:active { transform: scale(0.97); background: #1a1a1a; }

        .label {
            font-size: 13px;
            color: var(--secondary);
            margin-bottom: 8px;
        }

        .value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
        }

        .money-value { color: #4cd964; } /* Зеленый цвет для денег */

        .session-info {
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="title">Игровая статистика</div>

    <div class="stat-card">
        <span class="label">Текущий баланс</span>
        <span id="money" class="value money-value">$0</span>
    </div>

    <div class="stat-card">
        <span class="label">Ваш уровень (LVL)</span>
        <span id="score" class="value">0</span>
    </div>

    <div class="stat-card">
        <span class="label">Минут в игре за сессию</span>
        <span id="session" class="value">0</span>
    </div>

    <div class="session-info">Автоматическое обновление данных</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // --- ВСТАВЬ СВОИ ДАННЫЕ ТУТ ---
        const BIN_ID = "ТВОЙ_BIN_ID";
        const API_KEY = "ТВОЙ_КЛЮЧ";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

        async function updateData() {
            try {
                const response = await fetch(URL, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const res = await response.json();
                const data = res.record;

                // Обновляем текст на странице
                document.getElementById('money').innerText = "$" + Number(data.money).toLocaleString();
                document.getElementById('score').innerText = data.score;
                document.getElementById('session').innerText = data.session || 0;

            } catch (e) {
                console.log("Ошибка загрузки");
            }
        }

        // Обновление раз в 10 секунд
        setInterval(updateData, 10000);
        updateData();
    </script>
</body>
</html>
