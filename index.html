<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Объявления</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Font Awesome для иконок (опционально) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <header class="header">
            <div class="logo">
                <img src="logotip.png" alt="Logo" class="logo-img">
            </div>
            <div class="burger-menu" id="burger-menu">
                <i class="fas fa-bars"></i>
            </div>
        </header>

        <!-- Боковое меню (бургер) -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>Меню</span>
                <i class="fas fa-times" id="close-sidebar"></i>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" data-page="goods"><i class="fas fa-store"></i> Товары</a></li>
                <li><a href="#" data-page="profile"><i class="fas fa-user"></i> Профиль</a></li>
            </ul>
        </div>

        <!-- Основной контент -->
        <main id="main-content">
            <!-- Здесь будут подгружаться страницы -->
        </main>

        <!-- Плавающая кнопка для добавления объявления (видна на странице товаров) -->
        <button id="add-ad-btn" class="fab">+</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
