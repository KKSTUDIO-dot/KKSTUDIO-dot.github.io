<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Магазин | Telegram App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style/main.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
                <button id="add-ad-btn" class="btn-add">
                    <i class="fas fa-plus"></i> Добавить объявление
                </button>
            </div>
            
            <div class="category-tabs">
                <button class="tab-btn active" data-category="sale">Продажа</button>
                <button class="tab-btn" data-category="buy">Покупка</button>
                <button class="tab-btn" data-category="rent">Аренда</button>
                <button class="tab-btn" data-category="ad">Реклама</button>
            </div>

            <h2 style="margin-bottom: 16px;">Товары и услуги</h2>
            <div id="products-container">
                <div style="text-align: center; padding: 20px;">Загрузка...</div>
            </div>
            <div id="status" class="status"></div>
        </div>
        <div class="footer">
            Telegram Mini App
        </div>
    </div>

    <!-- Модальное окно добавления объявления -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Новое объявление</h3>
            <form id="add-form">
                <label>Ваш ник (или оставьте пустым):</label>
                <input type="text" id="ad-nickname" placeholder="Ваше имя в объявлении">
                
                <label>Категория:</label>
                <select id="ad-category" required>
                    <option value="sale">Продажа</option>
                    <option value="buy">Покупка</option>
                    <option value="rent">Аренда</option>
                    <option value="ad">Реклама</option>
                </select>
                
                <label>Название:</label>
                <input type="text" id="ad-name" required>
                
                <label>Цена (₽):</label>
                <input type="number" id="ad-price" required>
                
                <label>Описание:</label>
                <textarea id="ad-desc" rows="3"></textarea>
                
                <label>Ссылка на фото (URL):</label>
                <input type="url" id="ad-photo" placeholder="https://...">
                
                <button type="submit" class="btn-submit">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-store"></i>
            <span>Магазин</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue } from 'firebase/database';

        console.log('🚀 Загрузка Firebase...');

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app",
            storageBucket: "ds-studio-app.appspot.com"
        };

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log('✅ Firebase инициализирован успешно');
        } catch (error) {
            console.error('❌ Ошибка инициализации Firebase:', error);
            document.getElementById('products-container').innerHTML = 
                '<div style="text-align: center; padding: 20px; color: red;">Ошибка подключения к базе данных. Проверьте консоль.</div>';
        }

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const productsRef = db ? ref(db, 'products') : null;
        let currentProducts = [];
        let activeCategory = 'sale';

        const tgUser = tg.initDataUnsafe?.user || null;

        // Вкладки
        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.category;
                renderProductsByCategory();
            });
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderProductsByCategory() {
            const container = document.getElementById('products-container');
            if (!currentProducts.length) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">Нет объявлений. Добавьте первое!</div>';
                return;
            }
            const filtered = currentProducts.filter(p => p.category === activeCategory);
            if (!filtered.length) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">В этой категории пока нет объявлений</div>';
                return;
            }
            container.innerHTML = '';
            filtered.forEach(product => {
                const productEl = document.createElement('div');
                productEl.className = 'product';
                
                let photoHtml = '';
                if (product.photoUrl) {
                    photoHtml = `<img src="${escapeHtml(product.photoUrl)}" alt="${escapeHtml(product.name)}" class="product-image" onerror="this.style.display='none'">`;
                }
                
                productEl.innerHTML = `
                    <div class="product-content">
                        ${photoHtml}
                        <div class="product-info">
                            <h3>${escapeHtml(product.name)}</h3>
                            <p>${escapeHtml(product.description)}</p>
                            ${product.nickname ? `<small class="product-author">👤 ${escapeHtml(product.nickname)}</small>` : ''}
                        </div>
                        <div class="product-actions">
                            <span class="product-price">${product.price} ₽</span>
                            <button data-id="${product.id}">Купить</button>
                        </div>
                    </div>
                `;
                container.appendChild(productEl);
            });

            document.querySelectorAll('.product button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const productId = parseInt(btn.dataset.id);
                    const product = currentProducts.find(p => p.id === productId);
                    if (product) {
                        const data = {
                            action: 'purchase',
                            product: product,
                            user: tgUser,
                            timestamp: Date.now()
                        };
                        tg.sendData(JSON.stringify(data));
                        const statusDiv = document.getElementById('status');
                        statusDiv.textContent = `✅ ${product.name} добавлен в заказ!`;
                        setTimeout(() => { statusDiv.textContent = ''; }, 3000);
                    }
                });
            });
        }

        function loadProducts() {
            if (!productsRef) {
                console.error('❌ productsRef не определён');
                return;
            }
            onValue(productsRef, (snapshot) => {
                const data = snapshot.val();
                console.log('📦 Получены данные из Firebase:', data);
                if (data) {
                    currentProducts = Object.entries(data).map(([id, product]) => ({
                        id: parseInt(id),
                        ...product
                    }));
                } else {
                    currentProducts = [];
                }
                renderProductsByCategory();
            }, (error) => {
                console.error('❌ Ошибка чтения Firebase:', error);
                document.getElementById('products-container').innerHTML = 
                    '<div style="text-align: center; padding: 20px; color: red;">Ошибка загрузки данных. Проверьте консоль.</div>';
            });
        }

        async function addAdvertisement(category, name, price, description, photoUrl, nickname) {
            if (!productsRef) {
                alert('Ошибка: база данных не инициализирована');
                return;
            }
            const newId = Date.now();
            const finalNickname = nickname.trim() || (tgUser ? `${tgUser.first_name || ''} ${tgUser.last_name || ''}`.trim() || tgUser.username : 'Аноним');
            const newProduct = {
                id: newId,
                category: category,
                name: name.trim(),
                price: parseInt(price),
                description: description.trim(),
                photoUrl: photoUrl.trim() || null,
                nickname: finalNickname,
                userId: tgUser?.id || null,
                timestamp: newId
            };
            try {
                await set(ref(db, `products/${newId}`), newProduct);
                console.log('✅ Объявление добавлено:', newProduct);
                
                const data = {
                    action: 'new_advertisement',
                    product: newProduct,
                    user: tgUser,
                    timestamp: Date.now()
                };
                tg.sendData(JSON.stringify(data));
            } catch (error) {
                console.error('❌ Ошибка при добавлении объявления:', error);
                alert('Не удалось добавить объявление. Проверьте консоль.');
                throw error;
            }
        }

        // Модальное окно
        const modal = document.getElementById('modal');
        const addBtn = document.getElementById('add-ad-btn');
        const closeSpan = document.querySelector('.close');

        addBtn.onclick = () => modal.style.display = 'block';
        closeSpan.onclick = () => modal.style.display = 'none';
        window.onclick = (event) => {
            if (event.target == modal) modal.style.display = 'none';
        };

        const form = document.getElementById('add-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nickname = document.getElementById('ad-nickname').value;
            const category = document.getElementById('ad-category').value;
            const name = document.getElementById('ad-name').value.trim();
            const price = document.getElementById('ad-price').value;
            const desc = document.getElementById('ad-desc').value.trim();
            const photo = document.getElementById('ad-photo').value;
            
            if (!name || !price) {
                alert('Заполните название и цену');
                return;
            }
            await addAdvertisement(category, name, price, desc, photo, nickname);
            modal.style.display = 'none';
            form.reset();
            document.getElementById('status').textContent = '✅ Объявление добавлено!';
            setTimeout(() => { document.getElementById('status').textContent = ''; }, 3000);
        });

        if (db) {
            loadProducts();
        } else {
            document.getElementById('products-container').innerHTML = 
                '<div style="text-align: center; padding: 20px; color: red;">Не удалось инициализировать базу данных. Проверьте консоль.</div>';
        }
        tg.ready();
    </script>
</body>
</html>
