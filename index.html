<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ArzMob - Маркет</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <header class="header">
            <div class="logo-container">
                <a href="#" id="logo-link" class="logo-link">
                    <img src="logotip.png" alt="Logo" class="logo-img">
                </a>
                <span class="logo-text">ArzMob - Маркет</span>
            </div>
            <div class="burger-menu" id="burger-menu">
                <i class="fas fa-bars"></i>
            </div>
        </header>

        <!-- Боковое меню (бургер) -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>Меню</span>
                <i class="fas fa-times" id="close-sidebar"></i>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" data-page="goods"><i class="fas fa-store"></i> Товары</a></li>
                <li><a href="#" data-page="profile"><i class="fas fa-user"></i> Профиль</a></li>
            </ul>
        </div>

        <!-- Основной контент -->
        <main id="main-content">
            <!-- Страница Главная -->
            <div id="home-page" class="page">
                <div class="welcome">
                    <h2>Добро пожаловать!</h2>
                    <p>Здесь будут лучшие предложения</p>
                    <!-- Можно добавить рекомендуемые объявления -->
                </div>
            </div>

            <!-- Страница товаров (объявлений) -->
            <div id="goods-page" class="page">
                <div class="goods-list"></div>
            </div>

            <!-- Страница профиля -->
            <div id="profile-page" class="page">
                <div class="profile-info"></div>
                <div class="profile-ads">
                    <h3>Мои объявления</h3>
                    <div class="profile-ads-list"></div>
                </div>
            </div>
        </main>

        <!-- Плавающая кнопка добавления объявления (только на странице товаров) -->
        <button id="add-ad-btn" class="fab">+</button>

        <!-- Нижняя навигационная панель -->
        <nav class="bottom-nav">
            <div class="nav-item" data-nav="home">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </div>
            <div class="nav-item" data-nav="goods">
                <i class="fas fa-store"></i>
                <span>Товары</span>
            </div>
            <div class="nav-item" data-nav="profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </div>
        </nav>

        <!-- Модальное окно добавления объявления -->
        <div id="add-modal" class="modal">
            <textarea id="ad-text" placeholder="Описание товара..." rows="4"></textarea>
            <input type="file" id="ad-image" accept="image/*">
            <div class="modal-buttons">
                <button id="cancel-add">Отмена</button>
                <button id="submit-add">Опубликовать</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
