<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Профиль | Telegram App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style/main.css">
</head>
<body>
    <div class="container">
        <div id="profile-container"></div>
        <button id="close-btn" class="btn-secondary" style="width: 100%;">Закрыть приложение</button>
        <div class="footer">
            Telegram Mini App
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-store"></i>
            <span>Магазин</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const user = tg.initDataUnsafe?.user || null;
        const container = document.getElementById('profile-container');

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderProfile() {
            if (!user) {
                container.innerHTML = `
                    <div class="card">
                        <p style="text-align: center;">Данные пользователя недоступны.<br>Запустите приложение через Telegram.</p>
                    </div>
                `;
                return;
            }

            const avatarLetter = (user.first_name ? user.first_name.charAt(0) : 'U').toUpperCase();
            container.innerHTML = `
                <div class="card">
                    <div class="user-avatar">${avatarLetter}</div>
                    <div class="user-name">${escapeHtml(user.first_name || '')} ${escapeHtml(user.last_name || '')}</div>
                    <div class="user-username">${user.username ? '@' + escapeHtml(user.username) : 'Нет username'}</div>
                    <div class="user-id">ID: ${user.id}</div>
                    <div style="text-align: center; margin-bottom: 16px;">Язык: ${user.language_code || '—'}</div>
                    <button id="send-profile-btn">Отправить данные профиля</button>
                </div>
            `;

            const sendBtn = document.getElementById('send-profile-btn');
            if (sendBtn) {
                sendBtn.addEventListener('click', () => {
                    const data = {
                        action: 'profile_data',
                        user: user,
                        timestamp: Date.now()
                    };
                    tg.sendData(JSON.stringify(data));
                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'status';
                    statusDiv.textContent = '📤 Данные отправлены боту';
                    container.appendChild(statusDiv);
                    setTimeout(() => statusDiv.remove(), 3000);
                });
            }
        }

        renderProfile();

        document.getElementById('close-btn').addEventListener('click', () => {
            tg.close();
        });

        tg.ready();
    </script>
</body>
</html>
