<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>MotoBeast — запчастини</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style/main.css">
    <style>
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }
        .product-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #f0f0f0;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            padding: 15px;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--mz-red);
            box-shadow: var(--shadow-md);
        }
        .product-img {
            height: 160px;
            background: #f5f5f5;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #aaa;
            overflow: hidden;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 40px;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 5px 0;
            font-size: 14px;
        }
        .stars { color: #ffc107; }
        .rating-count { color: #888; }
        .price-block {
            display: flex;
            flex-direction: column;
            margin: 5px 0;
        }
        .old-price {
            font-size: 14px;
            color: #888;
            text-decoration: line-through;
            margin-bottom: 2px;
        }
        .current-price {
            font-size: 22px;
            font-weight: 900;
            color: var(--mz-red);
            line-height: 1.2;
        }
        .buy-btn {
            background: var(--mz-black);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            width: 100%;
        }
        .buy-btn:hover {
            background: var(--mz-red);
        }
        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: var(--mz-red);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="maintenance-screen">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <h1>MOTO<span>BEAST</span></h1>
        <p>Технічні роботи</p>
    </div>

    <header class="header">
        <div class="header-top">
            <div class="container header-flex">
                <a href="index.html" class="logo-group">
                    <div class="logo-icon"><i class="fa-solid fa-dragon"></i></div>
                    <div class="logo-text"><span class="m">MOTO</span><span class="b">BEAST</span></div>
                </a>
                <nav class="nav-menu">
                    <a href="#">Запчастини</a>
                    <a href="#">Екіпіровка</a>
                    <a href="#">Акції</a>
                    <a href="#">Контакти</a>
                </nav>
                <div class="user-actions">
                    <div id="auth-buttons">
                        <button class="auth-btn" onclick="showAuthModal()">Увійти</button>
                    </div>
                    <div id="user-info" style="display: none;" class="user-info">
                        <span id="user-name"></span>
                        <a href="profile.html" class="profile-btn"><i class="fa-solid fa-user"></i> Профіль</a>
                        <a onclick="logout()" class="logout-btn">Вийти</a>
                    </div>
                    <div class="cart-box" onclick="window.location.href='cart.html'">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="badge" id="cartBadge">0</span>
                    </div>
                </div>
                <div class="contacts-premium">
                    <span class="small-text" id="promo-text">Завантаження...</span>
                    <a href="tel:+380998183988" class="c-phone" id="site-phone">380998183988</a>
                    <span class="small-text">Пн-Пт 9:00–18:00</span>
                    <span class="moto-label">мотозилла мотозапчасти</span>
                </div>
            </div>
        </div>
    </header>

    <div class="nav-bar">
        <div class="container nav-flex">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Введіть назву запчастини або модель мотоцикла...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
    </div>

    <main class="container">
        <a href="javascript:history.back()" class="back-link"><i class="fa-solid fa-arrow-left"></i> Назад</a>
        <h1 id="model-title">Запчастини</h1>
        <div class="products-grid" id="products-list">
            <div style="text-align: center; grid-column: 1/-1;">Завантаження...</div>
        </div>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAuthModal()">&times;</span>
            <h2 style="font-size: 28px; margin-bottom: 10px;">Вхід / Реєстрація</h2>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Вхід</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Реєстрація</button>
            </div>
            <div id="loginAuth" class="auth-tab-content active">
                <div class="form-group">
                    <label>Логін</label>
                    <input type="text" id="login-username" placeholder="Ваш логін">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="signIn()">Увійти</button>
            </div>
            <div id="registerAuth" class="auth-tab-content">
                <div class="form-group">
                    <label>Логін *</label>
                    <input type="text" id="reg-username" placeholder="Унікальний логін">
                </div>
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Ім'я</label>
                    <input type="text" id="reg-firstname" placeholder="Ім'я">
                </div>
                <div class="form-group">
                    <label>Прізвище</label>
                    <input type="text" id="reg-lastname" placeholder="Прізвище">
                </div>
                <button class="btn-primary" onclick="signUp()">Зареєструватися</button>
            </div>
            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQECyI2wLqHF0BzletUPiG3ryOqWROPOE",
            databaseURL: "https://ds-studio-app-default-rtdb.firebaseio.com",
            projectId: "ds-studio-app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        updateAuthUI();

        onValue(ref(db, 'settings'), (snap) => {
            const s = snap.val();
            if (s) {
                const maintenance = s.maintenance || false;
                if (maintenance && (!currentUser || currentUser.role !== 'admin')) {
                    document.getElementById('maintenance-screen').style.display = 'flex';
                } else {
                    document.getElementById('maintenance-screen').style.display = 'none';
                }
                document.getElementById('site-phone').innerText = s.phone || '380998183988';
                document.getElementById('promo-text').innerText = s.promoText || 'Кращі ціни на запчастини';
            }
        });

        function getCart() {
            return JSON.parse(localStorage.getItem('motocart')) || [];
        }

        function saveCart(cart) {
            localStorage.setItem('motocart', JSON.stringify(cart));
            updateCartBadge();
        }

        function updateCartBadge() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = totalItems;
        }

        window.addToCart = (product) => {
            const cart = getCart();
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart(cart);
            alert('Товар додано до кошика');
        };

        updateCartBadge();

        function updateAuthUI() {
            if (currentUser) {
                document.getElementById('auth-buttons').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').textContent = ''; // ім'я не показуємо
            } else {
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-info').style.display = 'none';
            }
        }

        window.showAuthModal = () => {
            document.getElementById('authModal').style.display = 'flex';
        };
        window.closeAuthModal = () => {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('authMessage').innerText = '';
        };
        window.switchAuthTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('[onclick="switchAuthTab(\'login\')"]').classList.add('active');
                document.getElementById('loginAuth').classList.add('active');
            } else {
                document.querySelector('[onclick="switchAuthTab(\'register\')"]').classList.add('active');
                document.getElementById('registerAuth').classList.add('active');
            }
        };

        window.signUp = async () => {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const firstName = document.getElementById('reg-firstname').value.trim();
            const lastName = document.getElementById('reg-lastname').value.trim();

            if (!username || !password) {
                document.getElementById('authMessage').innerText = 'Логін і пароль обов\'язкові';
                return;
            }

            const snapshot = await get(child(ref(db), 'users/' + username));
            if (snapshot.exists()) {
                document.getElementById('authMessage').innerText = 'Користувач з таким логіном вже існує';
                return;
            }

            const userData = {
                username,
                password,
                firstName,
                lastName,
                role: 'user',
                createdAt: new Date().toISOString()
            };
            await set(ref(db, 'users/' + username), userData);
            currentUser = userData;
            localStorage.setItem('currentUser', JSON.stringify(userData));
            updateAuthUI();
            closeAuthModal();
        };

        window.signIn = async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) {
                document.getElementById('authMessage').innerText = 'Введіть логін і пароль';
                return;
            }

            const snapshot = await get(child(ref(db), 'users/' + username));
            if (!snapshot.exists()) {
                document.getElementById('authMessage').innerText = 'Невірний логін або пароль';
                return;
            }

            const userData = snapshot.val();
            if (userData.password !== password) {
                document.getElementById('authMessage').innerText = 'Невірний логін або пароль';
                return;
            }

            currentUser = userData;
            localStorage.setItem('currentUser', JSON.stringify(userData));
            updateAuthUI();
            closeAuthModal();
        };

        window.logout = () => {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateAuthUI();
        };

        const urlParams = new URLSearchParams(window.location.search);
        const modelId = urlParams.get('model');

        onValue(ref(db, 'models/' + modelId), (snap) => {
            const model = snap.val();
            if (model) document.getElementById('model-title').innerText = `Запчастини для ${model.name}`;
        });

        onValue(ref(db, 'productModels'), (linkSnap) => {
            const links = linkSnap.val() || {};
            const productIds = Object.keys(links).filter(pid => links[pid] && links[pid][modelId]);
            onValue(ref(db, 'products'), (prodSnap) => {
                const products = prodSnap.val() || {};
                let html = '';
                productIds.forEach(pid => {
                    const p = products[pid];
                    if (p) {
                        const price = Number(p.price).toLocaleString('uk-UA') + ' грн';
                        const oldPrice = p.old_price ? Number(p.old_price).toLocaleString('uk-UA') + ' грн' : null;
                        const rating = p.rating || 0;
                        const reviewsCount = p.reviewsCount || 0;
                        const stars = '★'.repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? '½' : '') + '☆'.repeat(5 - Math.ceil(rating));
                        html += `
                            <a href="product.html?id=${pid}" class="product-card">
                                <div class="product-img">${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<i class="fa-solid ${p.icon || 'fa-box'}"></i>`}</div>
                                <div class="product-title">${p.name}</div>
                                <div class="rating"><span class="stars">${stars}</span><span class="rating-count">(${reviewsCount})</span></div>
                                <div class="price-block">${oldPrice ? `<span class="old-price">${oldPrice}</span>` : ''}<span class="current-price">${price}</span></div>
                                <button class="buy-btn" onclick="event.preventDefault(); event.stopPropagation(); addToCart({ id: '${pid}', name: '${p.name.replace(/'/g, "\\'")}', price: ${p.price}, icon: '${p.icon || 'fa-box'}', imageUrl: '${p.imageUrl || ''}' })">КУПИТИ</button>
                            </a>
                        `;
                    }
                });
                document.getElementById('products-list').innerHTML = html || '<p style="grid-column:1/-1; text-align:center;">Немає товарів для цієї моделі</p>';
            });
        });

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                window.location.href = 'index.html?search=' + encodeURIComponent(e.target.value);
            }
        });
    </script>
</body>
</html>
